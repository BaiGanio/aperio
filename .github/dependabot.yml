# DEP-02 — Dependabot keeps dependencies and pinned actions patched.
# SECURITY.md advertises Dependabot coverage; this config makes it real.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      routine-npm:
        patterns:
          - "sanitize-html"
          - "helmet"
          - "fast-xml-parser"
          - "mysql2"
          - "@anthropic-ai/claude-agent-sdk"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      docker-actions:
        patterns:
          - "docker/*"
      ci-actions:
        patterns:
          - "actions/checkout"
          - "codecov/codecov-action"
