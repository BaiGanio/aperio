name: (ci) Docker smoke

on:
  workflow_dispatch:
    inputs:
      ghcr_digest:
        description: Optional explicit GHCR image reference or digest to smoke
        required: false
        default: ""
        type: string
  pull_request:
    branches: [master, dev]
    paths:
      - docker/**
      - vms/docker/**
      - server.js
      - db/**
      - lib/**
      - package.json
      - package-lock.json
      - .github/workflows/ci.docker-smoke.yml

permissions:
  contents: read
  packages: read

jobs:
  local-image:
    name: build and smoke local image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build local image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: aperio:test-local
      - name: Smoke local image
        run: bash vms/docker/run.sh --image aperio:test-local

  published-image:
    name: smoke explicit GHCR image
    if: github.event_name == 'workflow_dispatch' && inputs.ghcr_digest != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Smoke published image
        env:
          GHCR_IMAGE: ${{ inputs.ghcr_digest }}
        run: bash vms/docker/run.sh --image "$GHCR_IMAGE"
