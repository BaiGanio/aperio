name: (ci) Docker smoke

on:
  workflow_dispatch:
    inputs:
      ghcr_digest:
        description: Optional explicit GHCR image reference or digest to smoke
        required: false
        default: ""
        type: string
  pull_request:
    branches: [master, dev]
    paths:
      - docker/**
      - vms/docker/**
      - server.js
      - db/**
      - lib/**
      - package.json
      - package-lock.json
      - .github/workflows/ci.docker-smoke.yml

permissions:
  contents: read
  packages: read

jobs:
  local-image:
    name: build and smoke local image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build local image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: aperio:test-local
      - name: Smoke local image
        run: bash vms/docker/run.sh --image aperio:test-local

  published-image:
    name: smoke explicit GHCR image
    if: github.event_name == 'workflow_dispatch' && inputs.ghcr_digest != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Smoke published image
        env:
          GHCR_IMAGE: ${{ inputs.ghcr_digest }}
        run: bash vms/docker/run.sh --image "$GHCR_IMAGE"
