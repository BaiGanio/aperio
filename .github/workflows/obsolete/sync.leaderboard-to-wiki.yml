name: (sync) LEADERBOARD to Wiki
on:
  push:
    branches:
      - master  # Trigger on pushes to main
    paths:
      - '.github/LEADERBOARD.md' # Only run if this specific file changes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 # v4

      - name: Checkout Wiki Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 # v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo
          token: ${{ secrets.MY_PAT }}

      - name: Copy and Push to Wiki
        run: |
          LEADERBOARD_PATH='.github/LEADERBOARD.md';
          cp "$LEADERBOARD_PATH" wiki-repo/LEADERBOARD.md
          
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are actual changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update LEADERBOARD from main repository"
            git push
          else
            echo "No changes to sync."
          fi
