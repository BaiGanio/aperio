name: (ci) Real-app E2E (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-app-e2e:
    name: Real-app E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Run real-app E2E tests
        run: npm run test:e2e:real
