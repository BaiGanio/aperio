name: Require Linked Issue on PR— with Blocklist
on:
  pull_request:
    types: [opened, synchronize, closed]
    paths-ignore:
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - '.gitignore'
      - '.prettierrc'
      - '.editorconfig'
      - 'LEADERBOARD.md'
  issue_comment:
    types: [created]

jobs:
  check_pr:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, 'I agree'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ── Resolve PR context ──────────────────────────────────────────────
            let prNumber, username;
            if (context.eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
              username = context.payload.comment.user.login;
            } else {
              prNumber = context.payload.pull_request.number;
              username = context.payload.pull_request.user.login;
            }

            const closeAndComment = async (message) => {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body: message
              });
              await github.rest.pulls.update({
                owner, repo, pull_number: prNumber, state: 'closed'
              });
            };

            // ── 1. BLOCKLIST GUARD ──────────────────────────────────────────────
            let blockedUsers = [];
            try {
              const raw = fs.readFileSync('.github/blocklist.json', 'utf8');
              blockedUsers = JSON.parse(raw).blocked.map(u => u.toLowerCase());
            } catch (e) {
              console.log('No blocklist found or failed to parse — skipping block check.');
            }
            if (blockedUsers.includes(username.toLowerCase())) {
              await closeAndComment(
                `> [!CAUTION]\n> @${username} You are not permitted to submit PRs on this project.`
              );
              return;
            }

            // ── 2. LINKED ISSUE GUARD ───────────────────────────────────────────
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const title = pr.data.title || '';
            const linkRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i;
            const match = title.match(linkRegex);
            if (!match) {
              await closeAndComment(
                `> [!CAUTION]\n> This PR has been closed because the **title** does not reference a claimed issue.\n> Please rename your PR to include the issue link, e.g., \`feat: add login logic (Closes #123)\`.`
              );
              return;
            }

            // ── 3. CLAIMED BY THIS USER GUARD ──────────────────────────────────
            const linkedIssueNumber = parseInt(match[1]);
            try {
              const linkedIssue = await github.rest.issues.get({
                owner, repo, issue_number: linkedIssueNumber
              });
              const assignee = linkedIssue.data.assignee?.login;
              if (!assignee) {
                await closeAndComment(
                  `> [!CAUTION]\n> @${username} Issue #${linkedIssueNumber} has not been claimed. Please comment \`/claim\` on the issue first.`
                );
                return;
              }
              if (assignee.toLowerCase() !== username.toLowerCase()) {
                await closeAndComment(
                  `> [!CAUTION]\n> @${username} Issue #${linkedIssueNumber} is claimed by @${assignee}. You can only submit PRs for issues you have claimed.`
                );
                return;
              }
            } catch (e) {
              console.log(`Could not fetch linked issue #${linkedIssueNumber}:`, e.message);
            }

            // ── 4. CONTRIBUTOR AGREEMENT GUARD ─────────────────────────────────

            // -- Read current agreement version from CONTRIBUTOR_AGREEMENT.md
            let currentVersion = '1.0'; // fallback if no version tag found
            try {
              const agreementContent = fs.readFileSync('.github/CONTRIBUTOR_AGREEMENT.md', 'utf8');
              const versionMatch = agreementContent.match(/<!--\s*version:\s*([\d.]+)\s*-->/);
              if (versionMatch) currentVersion = versionMatch[1];
            } catch (e) {
              console.log('Could not read CONTRIBUTOR_AGREEMENT.md — using default version 1.0');
            }

            // -- Read current .github/CONTRIBUTORS.md
            const contributorsPath = '.github/CONTRIBUTORS.md';
            let contributorsContent = '';
            try {
              contributorsContent = fs.readFileSync(contributorsPath, 'utf8');
            } catch (e) {
              // File doesn't exist yet — will be created below
            }

            // -- Check if this user has already signed the CURRENT version
            // Row format: | Full Name | @username | #PR | YYYY-MM-DD | version |
            const userRowRegex = new RegExp(
              `\\|[^|]*\\|\\s*@${username}\\s*\\|[^|]*\\|[^|]*\\|\\s*([\\d.]+)\\s*\\|`,
              'i'
            );
            const existingRow = contributorsContent.match(userRowRegex);
            const signedVersion = existingRow ? existingRow[1].trim() : null;

            if (signedVersion === currentVersion) {
              console.log(`@${username} already signed agreement v${currentVersion}. Skipping.`);
              return;
            }

            // -- Check if they've commented "I agree" on this PR
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100
            });

            const agreed = comments.some(
              c => c.user.login.toLowerCase() === username.toLowerCase() &&
                   c.body.trim().toLowerCase().includes('i agree')
            );

            if (!agreed) {
              // Only prompt once per PR
              const alreadyPrompted = comments.some(
                c => c.user.login === 'github-actions[bot]' &&
                     c.body.includes('Contributor Agreement')
              );
              if (!alreadyPrompted) {
                const isRenewal = signedVersion !== null;
                const renewalNote = isRenewal
                  ? `\n> The agreement has been updated from **v${signedVersion}** → **v${currentVersion}**. Please review the changes before agreeing.`
                  : '';
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body:
                    `> [!IMPORTANT]\n>` +
                    (isRenewal
                      ? ` @${username} our Contributor Agreement has been updated! 📋`
                      : ` @${username} this appears to be your first contribution! 👋`) +
                    `\n>${renewalNote}\n>` +
                    `\n> Please read [Contributor Agreement v${currentVersion}](../blob/master/.github/CONTRIBUTOR_AGREEMENT.md) and reply with exactly:\n>\n> \`I agree\`\n>\n> Your sign-on will be automatically logged in \`.github/CONTRIBUTORS.md\`.`
                });
              }
              return;
            }

            // -- They agreed — fetch full name from GitHub profile
            let fullName = username;
            try {
              const userProfile = await github.rest.users.getByUsername({ username });
              if (userProfile.data.name) fullName = userProfile.data.name;
            } catch (e) {
              console.log(`Could not fetch profile for ${username}, using username as name.`);
            }

            // -- Build the new row
            const today = new Date().toISOString().split('T')[0];
            const newRow = `| ${fullName} | @${username} | #${prNumber} | ${today} | ${currentVersion} |\n`;

            const tableHeader =
              `| Name | GitHub | Sign-on PR | Date | Agreement Version |\n` +
              `|------|--------|------------|------|-------------------|\n`;

            if (!contributorsContent) {
              // Create file from scratch
              contributorsContent =
                `# Contributor Agreement Signatories\n\n` +
                `> This file is auto-maintained by the PR workflow. Do not edit manually.\n` +
                `> All contributors have agreed to the [Contributor Agreement](CONTRIBUTOR_AGREEMENT.md).\n\n` +
                tableHeader +
                newRow;
            } else if (signedVersion !== null) {
              // User exists but signed an old version — update their row in place
              contributorsContent = contributorsContent.replace(
                new RegExp(`\\|[^|]*\\|\\s*@${username}[^\\n]*\\n`, 'i'),
                newRow
              );
            } else {
              // New contributor — append row to existing table
              if (!contributorsContent.includes('| Name | GitHub |')) {
                contributorsContent += `\n${tableHeader}`;
              }
              contributorsContent += newRow;
            }

            fs.writeFileSync(contributorsPath, contributorsContent);

            // -- Commit and push
            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git add ${contributorsPath}`);
            execSync(
              `git commit -m "chore: log @${username} agreement v${currentVersion} (PR #${prNumber})"`
            );
            execSync('git push');

            // -- Confirm to contributor
            const isRenewal = signedVersion !== null;
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: isRenewal
                ? `> [!NOTE]\n> ✅ @${username} your agreement has been updated to **v${currentVersion}** in [\`.github/CONTRIBUTORS.md\`](../blob/main/.github/CONTRIBUTORS.md).`
                : `> [!NOTE]\n> ✅ @${username} your agreement **v${currentVersion}** has been recorded in [\`.github/CONTRIBUTORS.md\`](../blob/main/.github/CONTRIBUTORS.md). Welcome to the project! 🎉`
            });