name: Require Linked Issue on PR— with Blocklist

on:
  pull_request:
    types: [opened, synchronize, closed]
    # Do not trigger if ONLY these files are changed
    paths-ignore:
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - '.gitignore'
      - '.prettierrc'
      - '.editorconfig'
      - 'LEADERBOARD.md'

jobs:
  check_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repo (for blocklist)
        uses: actions/checkout@v4

      - name: Validate PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = context.payload.pull_request.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const closeAndComment = async (message) => {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body: message
              });
              await github.rest.pulls.update({
                owner, repo, pull_number: prNumber, state: 'closed'
              });
            };

            // 1. BLOCKLIST GUARD
            let blockedUsers = [];
            try {
              const raw = fs.readFileSync('.github/blocklist.json', 'utf8');
              blockedUsers = JSON.parse(raw).blocked.map(u => u.toLowerCase());
            } catch (e) {
              console.log('No blocklist found or failed to parse — skipping block check.');
            }
            if (blockedUsers.includes(username.toLowerCase())) {
              await closeAndComment(
                `> [!CAUTION]\n> @${username} You are not permitted to submit PRs on this project.`
              );
              return;
            }

            // 2. LINKED ISSUE GUARD
            const title = context.payload.pull_request.title || '';
            // Regex to find "Closes #123", "Fixes #456", etc. in the title
            const linkRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i;
            const match = title.match(linkRegex);

            if (!match) {
              await closeAndComment(
                `> [!CAUTION]\n> This PR has been closed because the **title** does not reference a claimed issue.\n> Please rename your PR to include the issue link, e.g., \`feat: add login logic (Closes #123)\`.`
              );
              return;
            }

            // 3. CLAIMED BY THIS USER GUARD — Extract ID from the title match
            const linkedIssueNumber = parseInt(match[1]);
            try {
              const linkedIssue = await github.rest.issues.get({
                owner, repo, issue_number: linkedIssueNumber
              });
              
              const assignee = linkedIssue.data.assignee?.login;
              
              if (!assignee) {
                await closeAndComment(
                  `> [!CAUTION]\n> @${username} Issue #${linkedIssueNumber} (referenced in title) has not been claimed. Please comment \`/claim\` on the issue first.`
                );
                return;
              }

              if (assignee.toLowerCase() !== username.toLowerCase()) {
                await closeAndComment(
                  `> [!CAUTION]\n> @${username} Issue #${linkedIssueNumber} is claimed by @${assignee}. You can only submit PRs for issues you have claimed.`
                );
                return;
              }
            } catch (e) {
              console.log(`Could not fetch linked issue #${linkedIssueNumber}:`, e.message);
            }