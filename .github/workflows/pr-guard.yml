name: PR Guard

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - '.gitignore'
      - '.prettierrc'
      - '.editorconfig'
      - 'LEADERBOARD.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-check'
        required: true
        type: number

jobs:
  check_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}

      - name: Validate PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── Resolve PR context ──────────────────────────────────────────────
            let prNumber, username;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pr_number);
              const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              username = pr.data.user.login;
              console.log(`Manual dispatch: re-checking PR #${prNumber} by @${username}`);
            } else {
              prNumber = context.payload.pull_request.number;
              username = context.payload.pull_request.user.login;
            }

            const { data: prData } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // ── HELPER: Silent nuke ─────────────────────────────────────────────
            // Removes user's comments, closes PR, optionally deletes branch.
            // Used for policy violations where no explanation is warranted
            // (blocklist, no linked issue, unowned issue).
            const silentNuke = async () => {
              console.log(`Nuking PR #${prNumber} by @${username}`);

              // Delete issue/PR comments by this user
              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber, per_page: 100
              });
              for (const c of issueComments) {
                if (c.user?.login?.toLowerCase() === username.toLowerCase()) {
                  try { await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id }); }
                  catch (e) { console.log(`Could not delete comment ${c.id}: ${e.message}`); }
                }
              }

              // Delete review comments by this user
              const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner, repo, pull_number: prNumber, per_page: 100
              });
              for (const c of reviewComments) {
                if (c.user?.login?.toLowerCase() === username.toLowerCase()) {
                  try { await github.rest.pulls.deleteReviewComment({ owner, repo, comment_id: c.id }); }
                  catch (e) { console.log(`Could not delete review comment ${c.id}: ${e.message}`); }
                }
              }

              // Close and retitle the PR
              await github.rest.pulls.update({
                owner, repo, pull_number: prNumber,
                state: 'closed',
                title: `[REMOVED] PR #${prNumber}`,
                body: 'This PR was removed due to policy violations.'
              });

              // Delete branch if not a fork
              if (!prData.head.repo?.fork) {
                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${prData.head.ref}` });
                  console.log(`Branch ${prData.head.ref} deleted.`);
                } catch (e) {
                  console.log(`Could not delete branch: ${e.message}`);
                }
              }
            };

            // ── 1. BLOCKLIST ────────────────────────────────────────────────────
            let blockedUsers = [];
            try {
              const raw = fs.readFileSync('.github/blocklist.json', 'utf8');
              blockedUsers = JSON.parse(raw).blocked.map(u => u.toLowerCase());
            } catch (e) {
              console.log('No blocklist found — skipping.');
            }
            if (blockedUsers.includes(username.toLowerCase())) {
              await silentNuke();
              return;
            }

            // ── 2. LINKED ISSUE IN TITLE ────────────────────────────────────────
            // Title must contain e.g. "closes #42", "fixes #7", "resolves #100"
            const linkRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i;
            const match = prData.title.match(linkRegex);
            if (!match) {
              await silentNuke();
              return;
            }

            // ── 3. ISSUE MUST BE ASSIGNED TO PR AUTHOR ──────────────────────────
            const linkedIssueNumber = parseInt(match[1]);
            try {
              const { data: linkedIssue } = await github.rest.issues.get({
                owner, repo, issue_number: linkedIssueNumber
              });
              const assignee = linkedIssue.assignee?.login;
              if (!assignee || assignee.toLowerCase() !== username.toLowerCase()) {
                await silentNuke();
                return;
              }
            } catch (e) {
              // Issue doesn't exist
              await silentNuke();
              return;
            }

            // ── 4. AUTO-LABEL FROM TITLE PREFIX ─────────────────────────────────
            const prefix = prData.title.toLowerCase().split(':')[0].trim();
            const validLabels = ['feat', 'fix', 'chore', 'docs', 'refactor'];
            if (validLabels.includes(prefix)) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: [prefix]
              });
              console.log(`Auto-labeled PR as: ${prefix}`);
            }

            console.log(`PR #${prNumber} passed all guards.`);