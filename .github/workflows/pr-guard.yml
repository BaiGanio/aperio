name: Require Linked Issue on PR — with Blocklist

on:
  pull_request:
    types: [opened]

jobs:
  check_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repo (for blocklist)
        uses: actions/checkout@v4

      - name: Validate PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = context.payload.pull_request.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const closeAndComment = async (message) => {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body: message
              });
              await github.rest.pulls.update({
                owner, repo, pull_number: prNumber, state: 'closed'
              });
            };

            // 1. BLOCKLIST GUARD
            let blockedUsers = [];
            try {
              const raw = fs.readFileSync('.github/blocklist.json', 'utf8');
              blockedUsers = JSON.parse(raw).blocked.map(u => u.toLowerCase());
            } catch (e) {
              console.log('No blocklist found or failed to parse — skipping block check.');
            }
            if (blockedUsers.includes(username.toLowerCase())) {
              await closeAndComment(
                `> [!CAUTION]\n> @${username} You are not permitted to submit PRs on this project.`
              );
              return;
            }

            // 2. LINKED ISSUE GUARD
            const body = context.payload.pull_request.body || '';
            const hasLink = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i.test(body);
            if (!hasLink) {
              await closeAndComment(
                `> [!CAUTION]\n> This PR has been closed — it does not reference a claimed issue.\n> Please claim an issue first using \`/claim\`, then link it in your PR with \`Closes #123\`.`
              );
              return;
            }

            // 3. CLAIMED BY THIS USER GUARD — extract issue number and verify ownership
            const match = body.match(/(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/i);
            if (match) {
              const linkedIssueNumber = parseInt(match[3]);
              try {
                const linkedIssue = await github.rest.issues.get({
                  owner, repo, issue_number: linkedIssueNumber
                });
                const assignee = linkedIssue.data.assignee?.login;
                if (!assignee) {
                  await closeAndComment(
                    `> [!CAUTION]\n> @${username} Issue #${linkedIssueNumber} has not been claimed. Please comment \`/claim\` on the issue before submitting a PR.`
                  );
                  return;
                }
                if (assignee.toLowerCase() !== username.toLowerCase()) {
                  await closeAndComment(
                    `> [!CAUTION]\n> @${username} Issue #${linkedIssueNumber} is claimed by @${assignee}, not you. You can only submit PRs for issues you have claimed.`
                  );
                  return;
                }
              } catch (e) {
                console.log(`Could not fetch linked issue #${linkedIssueNumber}:`, e.message);
              }
            }
