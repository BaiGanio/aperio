name: Update Leaderboard
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to manually award XP for'
        required: true
  pull_request:
    types: [closed]
    # Removed the branches: [master] filter to catch EVERY merge

jobs:
  update_rankings:
    # 1. Must be merged
    # 2. Author must NOT be a bot (Dependabot, etc.)
    # 3. Author must NOT end in [bot]
    if: >
      github.event.pull_request.merged == true && 
      github.event.pull_request.user.type != 'Bot' &&
      !endsWith(github.event.pull_request.user.login, '[bot]') &&
      github.event.pull_request.user.login != 'dependabot[bot]' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - uses: actions/checkout@v4
      - name: Update Leaderboard File
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs'); 
            const { owner, repo } = context.repo;  
            
            let prData;
            let prNumber;

            // 1. Determine PR Number and Fetch Data
            if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number;
              console.log(`Manual trigger for PR #${prNumber}`);
              const response = await github.rest.pulls.get({
                owner, repo, pull_number: parseInt(prNumber)
              });
              prData = response.data;
            } else {
              prData = context.payload.pull_request;
              prNumber = prData.number;
            }
            
            const prAuthor = prData.user.login;
            const prTitle = prData.title;

            console.log(`Processing PR #${prNumber} by @${prAuthor}`);

            // 1. FIND LINKED ISSUE
            const match = prTitle.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
            if (!match) {
              console.log("No linked issue found in PR title. Skipping.");
              return;
            }
            const issueNumber = parseInt(match[1]);

            // 2. FETCH LABELS FROM THE ISSUE (Not the PR)
            const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const labels = issue.data.labels.map(l => l.name.toLowerCase());
            
            console.log(`Processing PR #${prData.number} linked to Issue #${issueNumber}`);
            console.log(`Labels found on Issue #${issueNumber}: ${labels.join(', ')}`);


            // 3. XP-GRINDER FILTER (Check for noise files)
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: prNumber
            });

            // 1. FILES TO IGNORE (XP-Grinder Filter)
            const noiseFiles = [
              'package-lock.json',
              'yarn.lock',
              'pnpm-lock.yaml',
              'bun.lockb',
              '.gitignore',
              '.prettierrc',
              '.editorconfig',
              'LEADERBOARD.md' // Prevent recursion
            ];

            const fileNames = files.map(f => f.filename);

            // 2. LOGIC: Is this a "No-Value" PR?
            const isOnlyNoise = fileNames.every(file => noiseFiles.includes(file));

            if (isOnlyNoise) {
              console.log("XP Filter: PR contains only lockfiles or configs. Skipping leaderboard.");
              return; 
            }

            // 1. Calculate Points
            let points = 0;
            const isBounty = labels.some(l => l.includes('bounty') || l.includes('$'));
            const isRobin = labels.some(l => l.includes('robin-hood') || l.includes('🛡️'));

            labels.forEach(label => {
              const match = label.match(/(\d+)/);
              if (match) { points += parseInt(match[1]); }
            });
            if (labels.includes('status: point-of-interest')) points += 25;

            // Skip if no point-bearing labels
            if (points === 0 || (!isBounty && !isRobin)) {
              console.log("No points awarded for this PR. Skipping leaderboard update.");
              return;
            }

            const today = new Date().toISOString().split('T')[0];

            // 2. PARSE AND UPDATE
            let content = fs.readFileSync('LEADERBOARD.md', 'utf8');
            let lines = content.split('\n');
            const startMarker = '<!-- LEDGER_ROWS_START -->';
            const endMarker = '<!-- LEDGER_ROWS_END -->';
            const startIndex = lines.findIndex(l => l.includes(startMarker));
            const endIndex = lines.findIndex(l => l.includes(endMarker));

            if (startIndex === -1 || endIndex === -1) {
              throw new Error("Markers not found in LEADERBOARD.md");
            }

            // Get existing data rows
            let rows = lines.slice(startIndex + 1, endIndex).filter(r => r.includes('|'));
            let userFound = false;

            let updatedRows = rows.map(row => {
              let cols = row.split('|').map(c => c.trim()).filter(c => c !== "");
              // Expected Cols: [Rank, User, XP, Tasks, Role, Date]
              if (cols[1] === `@${prAuthor}`) {
                userFound = true;
                cols[2] = (parseInt(cols[2]) || 0) + points; 
                cols[3] = (parseInt(cols[3]) || 0) + 1;      
                cols[5] = today;                      
                
                if (isRobin && !cols[4].includes('🏹')) cols[4] = "🏹 Robin Hood";
                if (isBounty && !cols[4].includes('⚔️')) cols[4] = "⚔️ Bounty Hunter";
              }
              // Return the internal columns joined by pipes
              return cols.slice(1).join(' | ');
            });

            if (!userFound) {
              const userClass = isRobin ? "🏹 Robin Hood" : "⚔️ Bounty Hunter";
              updatedRows.push(`@${prAuthor} | ${points} | 1 | ${userClass} | ${today}`);
            }

            // 3. RE-SORT BY XP (XP is at index 1 in our 'updatedRows' format)
            updatedRows.sort((a, b) => parseInt(b.split('|')[1]) - parseInt(a.split('|')[1]));

            // 4. RE-RANK AND WRAP IN PIPES
            const finalRows = updatedRows.map((row, i) => `| ${i + 1} | ${row} |`);

            // 5. SAVE
            const newContent = [...lines.slice(0, startIndex + 1), ...finalRows, ...lines.slice(endIndex)].join('\n');
            fs.writeFileSync('LEADERBOARD.md', newContent);

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Leaderboard: Awarded points to @${{ github.event.pull_request.user.login }}"
