name: Release & Versioning (No Changelog)
#
on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          fetch-depth: 0

      - name: Analyze Commit
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^feat: ]]; then BUMP="minor"
          elif [[ "$MSG" =~ ^fix: ]]; then BUMP="patch"
          else BUMP="skip"
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.info.outputs.bump != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: versioning
        if: steps.info.outputs.bump != 'skip'
        run: |
          npm version ${{ steps.info.outputs.bump }} --no-git-tag-version
          NEW_V=$(node -p "require('./package.json').version")
          echo "new_v=$NEW_V" >> $GITHUB_OUTPUT

      - name: Write version for landing page
        if: steps.info.outputs.bump != 'skip'
        run: |
          sed -i "s/const version = '.*';/const version = '${{ steps.versioning.outputs.new_v }}';/" docs/scripts.js     

      - name: Commit Version Bump
        if: steps.info.outputs.bump != 'skip'
        run: |
          NEW_V="${{ steps.versioning.outputs.new_v }}"
          git add package.json package-lock.json
          git commit -m "chore: release v$NEW_V [skip ci]"
          git push origin master
          
      # --- NEW STEP: Create the Lite Zip ---
      - name: Create Lite Zip
        id: packer_lite
        if: steps.info.outputs.bump != 'skip'
        run: |
          # -r means recursive, -x excludes files you don't want          
          # 1. Define what to EXCLUDE here for better readability
          zip -r aperio-lite.zip . -x \
            "*.git/*" \
            "*.github/*" \
            "*.lancedb/*" \
            "node_modules/*" \
            "db/migrations/*" \
            "docker/*" \
            "docs/*" \
            "scripts/*" \
            "tests/*" \
            "*unstable*" \
            "aperio-dev.zip"
          
          # Step 2: Add specific files back (e.g., docs/index.html, docs/assets/version.txt)
          zip -u aperio-lite.zip \
            ".github/data/how-to-install.txt"       

          # 3. Generate SHA256 and store it as an output
          SHA_VALUE=$(shasum -a 256 aperio-lite.zip | awk '{print $1}')
          
          # 4. Explicitly write to GITHUB_OUTPUT
          echo "sha_lite=${SHA_VALUE}" >> "$GITHUB_OUTPUT"
       
      - name: Create Dev Zip
        id: packer_dev
        if: steps.info.outputs.bump != 'skip'
        run: |
          # Create dev zip with different exclusions
          zip -r aperio-dev.zip . -x \
            "*.git/*" \
            ".github/*" \
            "node_modules/*" \
            "docs/*" \
            "scripts*" \
            "*unstable*" \
            "aperio-lite.zip"

          # Generate SHA
          SHA_VALUE=$(shasum -a 256 aperio-dev.zip | awk '{print $1}')
          echo "sha_dev=${SHA_VALUE}" >> "$GITHUB_OUTPUT"       

      # --- UPDATE Release Step: Upload Both Files ---
      - name: Create GitHub Release
        if: steps.info.outputs.bump != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.new_v }}
          name: Release v${{ steps.versioning.outputs.new_v }}
          body: |
            ### 📦 Downloads
            - `aperio-lite.zip` - Non-code users
            - `aperio-dev.zip` - For developers
        
            ### 🔐 Verify Authenticity
            **aperio-lite.zip SHA256:** `${{ steps.packer_lite.outputs.sha_lite }}`
            **aperio-dev.zip SHA256:** `${{ steps.packer_dev.outputs.sha_dev }}`  
        
            ---
            **Signed by:** 🏆 Project Lead - L.K.
            ---
          generate_release_notes: true
          files: |
            aperio-lite.zip
            aperio-dev.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
