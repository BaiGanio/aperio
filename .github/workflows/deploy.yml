# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]
    # Only trigger if files in the 'docs' folder or the workflow itself change
    paths:
      - 'docs/**'
      - '.github/workflows/deploy.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: [actions/checkout@v4](https://github.com)
      
      - name: Setup Pages
        uses: [actions/configure-pages@v4](https://github.com)
      
      - name: Upload artifact
        uses: [actions/upload-pages-artifact@v3](https://github.com)
        with:
          path: './docs' # Path to your static files

      - name: Deploy to GitHub Pages
        id: deployment
        uses: [actions/deploy-pages@v4](https://github.com)
