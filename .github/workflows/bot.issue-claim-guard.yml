name: (bot) Issue Claim Guard

on:
  issue_comment:
    types: [created]

jobs:
  handle_claim:
    # Triggers on /claim OR your 'Yes' confirmation
    if: |
      github.event.issue.pull_request == null &&
      !contains(github.event.issue.labels.*.name, 'status: cooldown') &&
      (contains(github.event.comment.body, '/claim') || github.event.comment.body == 'Yes')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Evaluate Claim or Approval
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const commentBody = context.payload.comment.body.trim();
            const username = context.payload.comment.user.login;
            const rootDir = process.cwd();
            const AGREEMENT_RELATIVE_PATH = '.github/contributors/CONTRIBUTOR_AGREEMENT.md';
            const agreementPath = path.join(process.cwd(), AGREEMENT_RELATIVE_PATH);
            const CONTRIBUTORS_RELATIVE_PATH = '.github/contributors/CONTRIBUTORS.md';
            const contributorsPath = path.join(process.cwd(), CONTRIBUTORS_RELATIVE_PATH);
            const SENIORITY_TIERS_RELATIVE_PATH = '.github/data/seniority-tiers.json';
            const seniorityTiersPath = path.join(process.cwd(), SENIORITY_TIERS_RELATIVE_PATH);

            // ── 0. HELPERS ──────────────────────────────────────────────────────
            const finalizeClaim = async (targetUser) => {
              // Assign user
              await github.rest.issues.addAssignees({ owner, repo, issue_number: issueNumber, assignees: [targetUser] });
              
              // Check Agreement
              const signed = fs.readFileSync(contributorsPath, 'utf8').includes(`@${targetUser}`);
              if (!signed) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `> [!IMPORTANT]\n> @${targetUser} please reply with \`I agree\` to sign the [Contributor Agreement](AGREEMENT_RELATIVE_PATH).`
                });
              }

              // Lock & Tag
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['status: claimed'] });
              await github.rest.issues.lock({ owner, repo, issue_number: issueNumber, lock_reason: 'resolved' });
            };

            // ── CHECK: THE "I QUIT" PATH ───────────────────────────────────────────
            if (commentBody === 'I quit') {
              const isAssignee = context.payload.issue.assignee?.login === username;
              if (!isAssignee) return; // Only the person assigned can quit

              console.log(`@${username} is quitting Issue #${issueNumber}. Cleaning up...`);

              // A. Remove Assignee & "Claimed" label
              await github.rest.issues.update({ owner, repo, issue_number: issueNumber, assignees: [] });
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: 'status: claimed' }).catch(() => {});
              
              // B. Add Cooldown & Tag as "Abandoned"
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['status: cooldown', 'abandoned'] });

              // C. Unlock for others (after a cooldown, handled by your stale script)
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `> [!CAUTION]\n> @${username} has stepped down. This issue is now in **cooldown** for 24h before others can claim it. \n> Note: @${username} is now restricted from re-claiming this specific issue.`
              });
              
              // D. Lock the conversation to enforce the cooldown
              await github.rest.issues.lock({ owner, repo, issue_number: issueNumber, lock_reason: 'resolved' });
              return;
            }

            // ── CHECK: OWNER APPROVAL PATH ──────────────────────────────────────────
            if (commentBody === 'Yes' && username === owner) {
              const lastComment = (await github.rest.issues.listComments({ owner, repo, issue_number: issueNumber })).data
                .reverse().find(c => c.user.login !== owner);
              if (lastComment) await finalizeClaim(lastComment.user.login);
              return;
            }

            // ── CHECK: THE RE-CLAIM BLOCK ──────────────────────────────────────────
            if (commentBody === '/claim') {
              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: issueNumber });
              const hasQuitBefore = comments.some(c => 
                c.user.login === username && c.body.trim() === 'I quit'
              );

              if (hasQuitBefore) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `> [!WARNING]\n> @${username}, you previously quit this task. To maintain project velocity, you cannot re-claim an issue you have abandoned.`
                });
                return;
              }
            }

            // ── 2. CONFIG & SENIORITY ───────────────────────────────────────────
            const config = JSON.parse(fs.readFileSync(seniorityTiersPath, 'utf8'));
            const { tiers, messages, blocked_below_years } = config;

            function formatAccountAge(createdAt) {
              const now = new Date();
              const created = new Date(createdAt);
              
              let years = now.getFullYear() - created.getFullYear();
              let months = now.getMonth() - created.getMonth();
              
              if (months < 0) {
                years--;
                months += 12;
              }
              
              if (years === 0) return `${months} month${months !== 1 ? 's' : ''}`;
              if (months === 0) return `${years} year${years !== 1 ? 's' : ''}`;
              return `${years} year${years !== 1 ? 's' : ''} & ${months} month${months !== 1 ? 's' : ''}`;
            }
            const userProfile = await github.rest.users.getByUsername({ username });
            const accountAgeYears = formatAccountAge(userProfile.data.created_at);
            const accountAge = (new Date() - new Date(userProfile.data.created_at)) / (1000 * 60 * 60 * 24 * 365.25);

            const blockNewcomers = `🚫 **Account Too New to Claim Issues**\n\nHey @${username} — your GitHub account was created on **${userProfile.data.created_at}** (${accountAgeYears} ago) and does not yet meet this project's minimum contribution longevity requirement of **${blocked_below_years} years**.\n\n> [!NOTE]\n This project uses GitHub account age as a basic anti-spam and anti-bot measure. Genuine contributors build a history over time. If you believe this is an error, please contact a maintainer directly.`

            if (accountAge < blocked_below_years) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: blockNewcomers });
              return;
            }

            // ── 3. VALIDATION ───────────────────────────────────────────────────
            const currentTier = tiers.slice().reverse().find(t => accountAgeYears >= t.min_years);
            const issueLabels = context.payload.issue.labels.map(l => l.name.toLowerCase());
            const bountyLabel = issueLabels.find(l => currentTier.allowed_labels.map(b => b.toLowerCase()).includes(l));
            
            if (!bountyLabel || currentTier.allowed_labels.some(l => l.toLowerCase() === bountyLabel)) {
              await finalizeClaim(username);
              
              const successBody = `✅ Issue claimed by @${username} (${currentTier.name}, account age: ${accountAgeYears}). Good luck!`;
              
              await github.rest.issues.createComment({ 
                owner, repo, issue_number: issueNumber, 
                body: successBody 
              });
            } else {
              // ── 4. APPEAL PATH (Tier Mismatch) ──────────────────────────────
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['point-of-interest'] });
              
              const appealBody = `> [!IMPORTANT]\n 🔒 **Contribution Seniority Requirement Not Met**\n> @${username}, your seniority tier (**${currentTier.name}**) is currently below the requirement for this bounty (Account age: ${currentTier.min_years}+ years).\n>\n> You are not eligible to claim this issue at this time. You are welcome to work on issues labeled: ${currentTier.allowed_labels.join(", ")}.\n **Appeal Window Open:** Please reply in a comment with your motivation, if you still think and insist you can handle the work. Once the owner approves with **Yes**, the claim will proceed. Otherwise, you will receive explanation on why You can not work on this issue.\n\n> [!NOTE]\n This project uses GitHub account longevity as a basic anti-spam measure. Real contributors build reputation over time — bots and throwaway accounts don't. If you believe this is an error, please contact a maintainer.\n\n`;
              

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: appealBody
              });
              await github.rest.issues.lock({ owner, repo, issue_number: issueNumber, lock_reason: 'resolved' });
            }
