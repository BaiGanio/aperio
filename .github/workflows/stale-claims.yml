name: Cleanup Stale Claims
on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch:

jobs:
  stale_cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Process Stale Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const daysToStale = 7;
            const thresholdDate = new Date(Date.now() - (daysToStale * 24 * 60 * 60 * 1000));
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Fetch all open issues
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open'
            });

            console.log(`Checking ${issues.length} open issues for stale claims...`);

            for (const issue of issues) {
              // Skip Pull Requests (GitHub API treats PRs as issues in listForRepo)
              if (issue.pull_request) continue;

              const labels = issue.labels.map(l => l.name);
              const lastUpdated = new Date(issue.updated_at);
              const currentAssignee = issue.assignee ? issue.assignee.login : null;

              // 2. STALE CLAIM CHECK
              // Criteria: Has 'status: claimed', NOT 'point-of-interest', and older than 7 days
              if (labels.includes('status: claimed') && 
                  !labels.includes('point-of-interest') && 
                  lastUpdated < thresholdDate) {
                
                console.log(`Issue #${issue.number} is stale. Cleaning up...`);

                // A. Remove 'claimed' and Add 'cooldown'
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issue.number, name: 'status: claimed'
                }).catch(() => {});
                
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issue.number, labels: ['status: cooldown']
                });

                // B. Unassign the user
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number, assignees: []
                });

                // C. Post expiry message
                const mention = currentAssignee ? `@${currentAssignee}` : 'Contributor';
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `> [!CAUTION]\n> **Claim Expired.** ${mention}, you missed the ${daysToStale}-day window to complete the PR. The issue is now in cooldown.`
                });

                // D. Lock the issue to prevent immediate re-claiming during cooldown
                await github.rest.issues.lock({ 
                  owner, repo, issue_number: issue.number, 
                  lock_reason: 'resolved' 
                }).catch(e => console.log(`Lock failed: ${e.message}`));
              }

              // 3. UNLOCKING STALE ISSUES POST-COOLDOWN
              // Criteria: Has 'status: cooldown' and 'abandoned' older than 1 day
              if (labels.includes('status: cooldown') && labels.includes('abandoned')) {
                const lastUpdated = new Date(issue.updated_at);
                const oneDayAgo = new Date(Date.now() - (24 * 60 * 60 * 1000));

                if (lastUpdated < oneDayAgo) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: 'status: cooldown' });
                  await github.rest.issues.unlock({ owner, repo, issue_number: issue.number });
                  console.log(`Unlocked Issue #${issue.number} - Cooldown finished.`);
                }
              }
            }
