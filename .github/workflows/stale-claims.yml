name: Cleanup Stale Claims
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  stale_cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Remove stale claims
        uses: actions/github-script@v7
        with:
          script: |
            const daysToStale = 7;
            const msPerDay = 24 * 60 * 60 * 1000;
            const thresholdDate = new Date(Date.now() - (daysToStale * msPerDay));

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'status: claimed',
              state: 'open'
            });

            for (const issue of issues.data) {
              const lastUpdated = new Date(issue.updated_at);
              if (lastUpdated < thresholdDate) {
                // 1. Remove Label and Assignee
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'status: claimed'
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: []
                });
                // 2. Post Comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `> [!NOTE]\n> This claim has expired after ${daysToStale} days of inactivity. The issue is now open for others to claim. @${issue.assignee.login}, feel free to re-claim if you are still working on it!`
                });
              }
            }
