name: Cleanup Stale Claims
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  stale_cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read # Required to read the blocklist file
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Remove stale claims
        uses: actions/github-script@v7
        with:
          script: |
            const daysToStale = 7;
            const msPerDay = 24 * 60 * 60 * 1000;
            const thresholdDate = new Date(Date.now() - (daysToStale * msPerDay));

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'status: claimed',
              state: 'open'
            });

            for (const issue of issues.data) {
              const labels = issue.labels.map(l => l.name);;
              const assignee = issue.assignee ? issue.assignee.login.toLowerCase() : null;

              // --- LOGIC: NUKE BLOCKED USERS ---
              if (assignee && blockedUsers.includes(assignee)) {
                console.log(`Nuking blocked user @${assignee} from Issue #${issue.number}`);
                
                // Unassign and remove claim label
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number, assignees: []
                });
                if (labels.includes('status: claimed')) {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: issue.number, name: 'status: claimed'
                  }).catch(() => {});
                }

                // Delete all comments by this blocked user on this issue
                const comments = await github.rest.issues.listComments({
                  owner, repo, issue_number: issue.number
                });
                for (const comment of comments.data) {
                  if (blockedUsers.includes(comment.user.login.toLowerCase())) {
                    await github.rest.issues.deleteComment({
                      owner, repo, comment_id: comment.id
                    });
                  }
                }
                continue; // Move to next issue
              }

              // LOGIC: GUARD CHECK — Skip if 'status: point-of-interest' exists
              if (labels.includes('status: point-of-interest')) {
                console.log(`Skipping Issue #${issue.number} - Marked as Point of Interest.`);
                continue; 
              }
              const lastUpdated = new Date(issue.updated_at);
              if (lastUpdated < thresholdDate) {
                const previousOwner = issue.assignee.login;

                // 2. Remove Claim and Assignee, ADD COOLDOWN
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, name: 'status: claimed'
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, labels: ['status: cooldown']
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, assignees: []
                });
                // 3. Post "Missed It" Comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `> [!CAUTION]\n> **Claim Expired.** @${previousOwner}, you missed the 7-day window. \n>\n> Per our Fair Share policy, the previous holder cannot re-claim this immediately. The issue is now open for **new** contributors. Better luck next time!`
                });
              }
            }
