name: Cleanup Stale Claims
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  stale_cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read # Required to read the blocklist file
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Remove stale claims
        uses: actions/github-script@v7
        with:
          script: |
            const daysToStale = 7;
            const msPerDay = 24 * 60 * 60 * 1000;
            const thresholdDate = new Date(Date.now() - (daysToStale * msPerDay));
            const fs = require('fs');
            const { owner, repo } = context.repo;
            
            // 1. LOAD BLOCKLIST
            let blockedUsers = [];
            try {
              if (fs.existsSync('.github/blocklist.json')) {
                const data = JSON.parse(fs.readFileSync('.github/blocklist.json', 'utf8'));
                blockedUsers = (data.blocked || []).map(u => u.toLowerCase());
                console.log(`Loaded ${blockedUsers.length} blocked users.`);
              }
            } catch (e) {
              console.log('Error reading blocklist.json:', e.message);
            }
            
            // 2. FETCH ALL OPEN ISSUES (Broad search to find comments anywhere)
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open'
            });

            for (const issue of issues) {
              const issueNumber = issue.number;
              const labels = issue.labels.map(l => l.name);
              const assignee = issue.assignee ? issue.assignee.login.toLowerCase() : null;
            
              // --- TASK 1: NUKE ANY BLOCKED USER COMMENTS ---
              // We do this for EVERY open issue, even if not assigned to a blocked user
              if (blockedUsers.length > 0) {
                const comments = await github.rest.issues.listComments({
                  owner, repo, issue_number: issueNumber
                });
                
                for (const comment of comments.data) {
                  const commenter = comment.user.login.toLowerCase();
                  if (blockedUsers.includes(commenter)) {
                    console.log(`Deleting comment ${comment.id} by @${commenter} on Issue #${issueNumber}`);
                    await github.rest.issues.deleteComment({
                      owner, repo, comment_id: comment.id
                    }).catch(e => console.log(`Failed to delete: ${e.message}`));
            
                    // If the blocked user happens to be the assignee, kick them off
                    if (assignee === commenter) {
                      console.log(`Unassigning blocked user @${commenter} from #${issueNumber}`);
                      await github.rest.issues.update({
                        owner, repo, issue_number: issueNumber, assignees: []
                      });
                      if (labels.includes('status: claimed')) {
                        await github.rest.issues.removeLabel({
                          owner, repo, issue_number: issueNumber, name: 'status: claimed'
                        }).catch(() => {});
                      }
                    }
                  }
                }
              }

            // --- TASK 2: STALE CLAIM CLEANUP (Original Logic) ---
            if (labels.includes('status: claimed') && !labels.includes('status: point-of-interest') && issue.assignee) {
              // Re-check assignee here in case they were just nuked above
              const currentAssignee = issue.assignee ? issue.assignee.login : null;
              if (!currentAssignee) continue;
          
              const lastUpdated = new Date(issue.updated_at);
              if (lastUpdated < thresholdDate) {
                console.log(`Cleaning up stale claim on #${issueNumber} for @${currentAssignee}`);
                
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNumber, name: 'status: claimed'
                }).catch(() => {});
                
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber, labels: ['status: cooldown']
                });
          
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber, assignees: []
                });
          
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `> [!CAUTION]\n> **Claim Expired.** @${currentAssignee}, you missed the 7-day window.`
                });
              }
            }
          }
