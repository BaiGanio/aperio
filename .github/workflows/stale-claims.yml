name: Cleanup Stale Claims
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  stale_cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove stale claims and nuke blocked users
        uses: actions/github-script@v7
        with:
          script: |
            const daysToStale = 7;
            const msPerDay = 24 * 60 * 60 * 1000;
            const thresholdDate = new Date(Date.now() - (daysToStale * msPerDay));
            const fs = require('fs');
            const { owner, repo } = context.repo;
            
            // 1. LOAD BLOCKLIST
            let blockedUsers = [];
            try {
              if (fs.existsSync('.github/blocklist.json')) {
                const data = JSON.parse(fs.readFileSync('.github/blocklist.json', 'utf8'));
                blockedUsers = (data.blocked || []).map(u => u.toLowerCase());
                console.log(`Loaded ${blockedUsers.length} blocked users.`);
              }
            } catch (e) {
              console.log('Error reading blocklist.json:', e.message);
            }

            // 2. FETCH ALL OPEN ISSUES
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open'
            });

            for (const issue of issues) {
              const labels = issue.labels.map(l => l.name);
              const assignee = issue.assignee ? issue.assignee.login.toLowerCase() : null;

              // --- TASK A: NUKE BLOCKED USER COMMENTS & ASSIGNMENTS ---
              if (blockedUsers.length > 0) {
                const comments = await github.rest.issues.listComments({
                  owner, repo, issue_number: issue.number
                });
                
                for (const comment of comments.data) {
                  const commenter = comment.user.login.toLowerCase();
                  if (blockedUsers.includes(commenter)) {
                    console.log(`Deleting comment ${comment.id} by @${commenter} on Issue #${issue.number}`);
                    await github.rest.issues.deleteComment({
                      owner, repo, comment_id: comment.id
                    }).catch(e => console.log(`Failed to delete: ${e.message}`));

                    // If they are assigned, remove them
                    if (assignee === commenter) {
                      await github.rest.issues.update({
                        owner, repo, issue_number: issue.number, assignees: []
                      });
                      if (labels.includes('status: claimed')) {
                        await github.rest.issues.removeLabel({
                          owner, repo, issue_number: issue.number, name: 'status: claimed'
                        }).catch(() => {});
                      }
                    }
                  }
                }
              }

              // --- TASK B: STALE CLAIM CHECK (Only for non-blocked users) ---
              if (labels.includes('status: claimed') && !labels.includes('status: point-of-interest') && issue.assignee) {
                // If we just unassigned a blocked user, issue.assignee might be null now
                const currentAssignee = issue.assignee ? issue.assignee.login : null;
                if (!currentAssignee || blockedUsers.includes(currentAssignee.toLowerCase())) continue;

                const lastUpdated = new Date(issue.updated_at);
                if (lastUpdated < thresholdDate) {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: issue.number, name: 'status: claimed'
                  }).catch(() => {});
                  
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: issue.number, labels: ['status: cooldown']
                  });

                  await github.rest.issues.update({
                    owner, repo, issue_number: issue.number, assignees: []
                  });

                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issue.number,
                    body: `> [!CAUTION]\n> **Claim Expired.** @${currentAssignee}, you missed the 7-day window.`
                  });
                }
              }
            }
