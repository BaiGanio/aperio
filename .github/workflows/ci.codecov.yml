name: (ci) Codecov Run tests and upload coverage

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 # v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26        # match the locally verified runtime and node:test behavior

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage and capture E2E results
        id: tests
        continue-on-error: true
        run: npm run test:ci:dashboard

      - name: Generate dashboard data
        id: dashboards
        run: |
          npm run coverage:dashboard
          npm run e2e:dashboard

      - name: Upload results to Codecov
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          exclude: ./coverage/tmp/
          fail_ci_if_error: true

      - name: Upload Pages source
        if: >-
          always() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          steps.dashboards.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-pages-source
          path: ./docs
          retention-days: 7

      - name: Preserve test failure status
        if: always() && steps.tests.outcome == 'failure'
        run: exit 1
