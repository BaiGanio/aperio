name: (ci) Codecov Run tests and upload coverage

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit and integration coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2 # v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26        # match the locally verified runtime and node:test behavior

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests with coverage
        id: tests
        continue-on-error: true
        run: npm run test:ci:unit

      - name: Generate coverage dashboard data
        if: always() && hashFiles('coverage/lcov.info') != ''
        run: npm run coverage:dashboard

      - name: Generate unit dashboard data
        if: always() && hashFiles('unit-results.json') != ''
        run: npm run unit:dashboard

      - name: Upload results to Codecov
        if: >-
          always() &&
          hashFiles('coverage/lcov.info') != '' &&
          (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          exclude: ./coverage/tmp/
          fail_ci_if_error: true

      - name: Upload coverage dashboard data
        if: >-
          always() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          hashFiles('docs/dashboards/coverage-data.js') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-dashboard-data
          path: ./docs/dashboards/coverage-data.js
          retention-days: 7

      - name: Upload unit dashboard data
        if: >-
          always() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          hashFiles('docs/dashboards/unit-data.js') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-dashboard-data
          path: ./docs/dashboards/unit-data.js
          retention-days: 7

      - name: Preserve test failure status
        if: always() && steps.tests.outcome == 'failure'
        run: exit 1

  e2e-dashboard:
    name: E2E tests and dashboard data (excluding real-app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2 # v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Run non-real E2E tests and generate dashboard data
        run: npm run test:e2e:ci:dashboard

      - name: Upload E2E dashboard data
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          hashFiles('docs/dashboards/e2e-data.js') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-dashboard-data
          path: ./docs/dashboards/e2e-data.js
          retention-days: 7

  integration-dashboard:
    name: Integration tests and dashboard data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2 # v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests and generate dashboard data
        run: npm run test:integration:ci:dashboard

      - name: Upload integration dashboard data
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          hashFiles('docs/dashboards/integration-data.js') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-dashboard-data
          path: ./docs/dashboards/integration-data.js
          retention-days: 7

  pages-source:
    name: Assemble Pages source
    needs: [unit-tests, e2e-dashboard, integration-dashboard]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.unit-tests.result == 'success' &&
      needs.e2e-dashboard.result == 'success' &&
      needs.integration-dashboard.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2 # v4

      - name: Download coverage dashboard data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-dashboard-data
          path: ./docs/dashboards

      - name: Download unit dashboard data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-dashboard-data
          path: ./docs/dashboards

      - name: Download integration dashboard data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: integration-dashboard-data
          path: ./docs/dashboards

      - name: Download E2E dashboard data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-dashboard-data
          path: ./docs/dashboards

      - name: Upload Pages source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-source
          path: ./docs
          retention-days: 7
