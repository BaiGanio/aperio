name: (ci) Codecov Run tests and upload coverage

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22        # pin to a version that ships node:test + V8 coverage

      - name: Install dependencies
        run: npm ci               # ci is faster and safer than install in CI

      - name: Run tests with coverage
        run: npm run test:ci      # runs c8 + all test files, writes coverage/lcov.info

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true  # don't silently pass if upload fails