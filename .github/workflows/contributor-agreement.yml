name: Contributor Agreement

on:
  issue_comment:
    types: [created]

jobs:
  agreement:
    # Run on issue comments containing "I agree"
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, 'I agree')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}

      - name: Process Agreement
        uses: actions/github-script@v7
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const rootDir = process.cwd();
            const AGREEMENT_RELATIVE_PATH = '.github/contributors/CONTRIBUTOR_AGREEMENT.md';
            const agreementPath = path.join(process.cwd(), AGREEMENT_RELATIVE_PATH);
            const CONTRIBUTORS_RELATIVE_PATH = '.github/contributors/CONTRIBUTORS.md';
            const contributorsPath = path.join(process.cwd(), CONTRIBUTORS_RELATIVE_PATH);

            const prNumber = context.eventName === 'issue_comment'
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;

            // ── Read current agreement version ──────────────────────────────────
            let currentVersion = '1.0';
            try {
              const content = fs.readFileSync(agreementPath, 'utf8');
              const m = content.match(/<!--\s*version:\s*([\d.]+)\s*-->/);
              if (m) currentVersion = m[1];
            } catch (e) {
              console.log('CONTRIBUTOR_AGREEMENT.md not found — using version 1.0');
            }

            // ── Read contributors log ───────────────────────────────────────────
            let contributorsContent = '';
            try {
              contributorsContent = fs.readFileSync(contributorsPath, 'utf8');
            } catch (e) { /* will be created below */ }

            // ── Check if already signed this version ────────────────────────────
            const userRowRegex = new RegExp(
              `\\|[^|]*\\|\\s*@${username}\\s*\\|[^|]*\\|[^|]*\\|\\s*([\\d.]+)\\s*\\|`, 'i'
            );
            const existingRow   = contributorsContent.match(userRowRegex);
            const signedVersion = existingRow ? existingRow[1].trim() : null;

            if (signedVersion === currentVersion) {
              console.log(`@${username} already signed v${currentVersion}. Nothing to do.`);
              return;
            }

            // ── Check for "I agree" comment ─────────────────────────────────────
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100
            });

            const hasAgreed = comments.some(
              c => c.user.login.toLowerCase() === username.toLowerCase() &&
                   c.body.trim().toLowerCase().includes('i agree')
            );

            if (!hasAgreed) {
              const alreadyPrompted = comments.some(
                c => c.user.login === 'github-actions[bot]' &&
                     c.body.includes('Contributor Agreement')
              );
              if (alreadyPrompted) return;

              const isRenewal   = signedVersion !== null;
              const renewalNote = isRenewal
                ? `\n> The agreement has been updated from **v${signedVersion}** → **v${currentVersion}**. Please review the changes before agreeing.`
                : '';

              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body:
                  `> [!IMPORTANT]\n>` +
                  (isRenewal
                    ? ` @${username} our Contributor Agreement has been updated! 📋`
                    : ` @${username} welcome to your first contribution! 👋`) +
                  `\n>${renewalNote}\n>` +
                  `\n> Please read [Contributor Agreement v${currentVersion}](${AGREEMENT_RELATIVE_PATH}) and reply with exactly:\n>\n> \`I agree\`\n>\n> Your sign-on will be automatically logged in \`.github/contributors/CONTRIBUTORS.md\`.`
              });
              return;
            }

            // ── Log the agreement ───────────────────────────────────────────────
            let fullName = username;
            try {
              const { data: profile } = await github.rest.users.getByUsername({ username });
              if (profile.name) fullName = profile.name;
            } catch (e) { /* use username as fallback */ }

            const today  = new Date().toISOString().split('T')[0];
            const newRow = `| ${fullName} | @${username} | #${prNumber} | ${today} | ${currentVersion} |\n`;
            const header =
              `| Name | GitHub | Sign-on Issue | Date | Agreement Version |\n` +
              `|------|--------|------------|------|-------------------|\n`;

            if (!contributorsContent) {
              contributorsContent =
                `# Contributor Agreement Signatories\n\n` +
                `> This file is auto-maintained by the PR workflow. Do not edit manually.\n` +
                `> All contributors have agreed to the [Contributor Agreement](${AGREEMENT_RELATIVE_PATH}).\n\n` +
                header + newRow;
            } else if (signedVersion !== null) {
              // Update existing row (version renewal)
              contributorsContent = contributorsContent.replace(
                new RegExp(`\\|[^|]*\\|\\s*@${username}[^\\n]*\\n`, 'i'), newRow
              );
            } else {
              if (!contributorsContent.includes('| Name | GitHub |')) {
                contributorsContent += `\n${header}`;
              }
              contributorsContent += newRow;
            }

            fs.writeFileSync(contributorsPath, contributorsContent);

            const { execSync } = require('child_process');
            // A. Configure Git
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            // B. Stage and Commit
            execSync(`git add ${contributorsPath}`);
            execSync(`git commit -m "chore: log @${username} agreement v${currentVersion} (PR #${prNumber})"`);
            // C. Push using the PAT for authentication
            // C.1 We use the 'MY_PAT' secret you already passed into the action
            const pat = process.env.MY_PAT; 
            execSync(`git push https://x-access-token:${pat}@github.com/${owner}/${repo}.git HEAD:master`);
            console.log(`Successfully logged agreement for @${username}`);
            
            const isRenewal = signedVersion !== null;
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: isRenewal
                ? `> [!NOTE]\n> ✅ @${username} your agreement has been updated to **v${currentVersion}** in [\`.github/contributors/CONTRIBUTORS.md\`](CONTRIBUTORS_RELATIVE_PATH).`
                : `> [!NOTE]\n> ✅ @${username} your agreement **v${currentVersion}** has been recorded in [\`.github/contributors/CONTRIBUTORS.md\`](CONTRIBUTORS_RELATIVE_PATH). Welcome to the project! 🎉`
            });
