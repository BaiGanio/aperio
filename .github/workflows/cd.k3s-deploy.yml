# (cd) K3s Deploy — build Docker image, notify Pi to redeploy.
#
# Triggered on pushes to the `main` branch (or dispatch). Cross-compiles the
# Aperio Docker image for ARM64 on GitHub's AMD64 runners using QEMU, pushes
# it to ghcr.io, then sends a webhook to your Raspberry Pi k3s cluster so it
# pulls the new image and rolls out.
#
# Prerequisites (set these in GitHub → Settings → Secrets and variables → Actions):
#   APERIO_PI_WEBHOOK_URL   — e.g. https://aperio-webhook.your-pi.ts.net:9001
#   APERIO_PI_WEBHOOK_SECRET  — HMAC secret, same as in aperio-webhook.conf on the Pi
#
# The image is pushed to ghcr.io/<repo-owner>/aperio. The repository is public
# so the image is public too — no imagePullSecrets needed on the Pi for pulls.
# For private repos, add imagePullSecrets to the k8s Deployment.
#
# Pi-side setup:
#   1. sudo apt install -y webhook
#   2. Copy aperio-webhook.conf  → /etc/webhook.d/aperio.conf
#   3. Copy aperio-webhook.service  → /etc/systemd/system/
#   4. systemctl daemon-reload && systemctl enable --now aperio-webhook
#   See k8s/aperio-webhook.service for details.

name: (cd) K3s Deploy

on:
  push:
    branches: [master]
    paths:
      - server.js
      - bootstrap.js
      - lib/**
      - db/**
      - mcp/**
      - public/**
      - docker/**
      - k8s/**
      - package.json
      - package-lock.json
      - .github/workflows/cd.k3s-deploy.yml
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "master"
      skip_build:
        description: "Skip image build, just notify Pi"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build Image & Notify Pi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      # ── Build on GitHub, push to ghcr.io, Pi pulls ──────────────
      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (ARM64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_OWNER }}/aperio:latest
            ghcr.io/${{ env.REGISTRY_OWNER }}/aperio:${{ github.sha }}

