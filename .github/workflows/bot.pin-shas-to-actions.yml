name: (bot) Pin SHAs to Actions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: pin-actions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.MY_PAT }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install pin-github-action
        run: npm install --ignore-scripts -g pin-github-action

      - name: Pin all workflow SHAs
        run: |
          find .github/workflows -name '*.yml' -o -name '*.yaml' | while read f; do
            pin-github-action "$f" || echo "⚠️ Could not pin some actions in $f, skipping"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}

      - name: Commit if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add .github/workflows/
          git commit -m "ci: pin actions to full SHAs [skip ci]"
          git pull --rebase
          git push