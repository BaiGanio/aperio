name: (sync) Dev Branch
permissions:
  contents: read
on:
  workflow_run:
    workflows: ["(cd) Release & Versioning"]
    types: [completed]

jobs:
  update-dev:
    runs-on: ubuntu-latest
    if: |
      github.ref_name == 'master' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: master
          token: ${{ secrets.MY_PAT }}

      - name: Create dev files
        run: |
          mkdir -p dev-files
          # Now copy only the files you want
          files=(
            README.md
            CONTRIBUTING.md
            LICENSE
            .env.example
            package.json
            package-lock.json
            server.js
            db
            docker
            lib
            mcp
            prompts
            public
            skills
            tests
          )
          for item in "${files[@]}"; do
            if [ -e "${{ github.workspace }}/$item" ]; then
                cp -r "${{ github.workspace }}/$item" dev-files/
            else
                echo "Warning: $item not found in source"
            fi
          done

      - name: Push to dev branch
        run: |
          zip -r "$ZIP_NAME" dev-files/
          # or with junk-paths to strip the dev-files/ prefix:
          cd dev-files && zip -r "../$ZIP_NAME" .
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update dev branch for v$(node -p "require('../package.json').version")"
          git push -f https://x-access-token:${{ secrets.MY_PAT }}@github.com/BaiGanio/aperio.git HEAD:dev   