# cd.release.yml
#
# Release & Versioning
# ─────────────────────────────────────────────────────────────────────────────
# Commit message conventions
#   feat: …              → minor bump, source-only zip
#   fix: …               → patch bump, source-only zip
#   feat(launchers): …   → minor bump + per-platform launcher zips
#   fix(launchers): …    → patch bump + per-platform launcher zips
#
# Anything else (or a message containing "skip ci") → no-op.
# ─────────────────────────────────────────────────────────────────────────────

name: (cd) Release & Versioning

on:
  push:
    branches: [master]

permissions:
  contents: write

# ── Excluded paths that never belong in any release zip ──────────────────────
# Defined once here and reused in both packaging jobs via env.
env:
  ZIP_EXCLUDES: >-
    .git/* .github/* .lancedb/* node_modules/*
    db/migrations/* docker/* docs/* tests/*
    lite/* deno.json deno.lock .c8rc dist/*
    launchers/* release_summary.txt README.md how-to/*

# =============================================================================
jobs:

  # ── 1. Analyze commit & bump version ───────────────────────────────────────
  version:
    name: Analyze & Bump Version
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    outputs:
      new_v:        ${{ steps.versioning.outputs.new_v }}
      bump:         ${{ steps.info.outputs.bump }}
      with_launchers: ${{ steps.info.outputs.with_launchers }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          fetch-depth: 0

      # Determine bump type and whether launcher binaries are requested.
      # Convention: feat(launchers): or fix(launchers): opts into the binary path.
      - name: Analyze Commit
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)

          if   [[ "$MSG" =~ ^feat\(launchers\): ]]; then BUMP="minor"; WITH_LAUNCHERS="true"
          elif [[ "$MSG" =~ ^fix\(launchers\):  ]]; then BUMP="patch"; WITH_LAUNCHERS="true"
          elif [[ "$MSG" =~ ^feat:              ]]; then BUMP="minor"; WITH_LAUNCHERS="false"
          elif [[ "$MSG" =~ ^fix:               ]]; then BUMP="patch"; WITH_LAUNCHERS="false"
          else                                          BUMP="skip";  WITH_LAUNCHERS="false"
          fi

          echo "bump=$BUMP"                   >> "$GITHUB_OUTPUT"
          echo "with_launchers=$WITH_LAUNCHERS" >> "$GITHUB_OUTPUT"
          echo "→ bump=$BUMP  with_launchers=$WITH_LAUNCHERS"

      - name: Configure Git
        if: steps.info.outputs.bump != 'skip'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: versioning
        if: steps.info.outputs.bump != 'skip'
        run: |
          npm version ${{ steps.info.outputs.bump }} --no-git-tag-version
          NEW_V=$(node -p "require('./package.json').version")
          echo "new_v=$NEW_V" >> "$GITHUB_OUTPUT"

      - name: Write version for landing page
        if: steps.info.outputs.bump != 'skip'
        run: |
          sed -i "s/const version = '.*';/const version = '${{ steps.versioning.outputs.new_v }}';/" docs/scripts.js

      - name: Commit & Tag Version Bump
        if: steps.info.outputs.bump != 'skip'
        run: |
          set -euo pipefail
          NEW_V="${{ steps.versioning.outputs.new_v }}"

          git add package.json package-lock.json docs/scripts.js
          git commit -m "chore: release v$NEW_V [skip ci]"

          # MY_PAT is required — GITHUB_TOKEN pushes never trigger downstream workflows
          git remote set-url origin \
            https://x-access-token:${{ secrets.MY_PAT }}@github.com/${{ github.repository }}

          echo "→ creating tag v$NEW_V..."
          git tag "v$NEW_V"

          echo "→ pushing tag..."
          git push origin "v$NEW_V"

          echo "→ pushing master..."
          git push origin master

          echo "→ verifying tag exists on remote..."
          git ls-remote --tags origin "refs/tags/v$NEW_V"
          echo "✅ tag confirmed on remote"


  # ── 2a. Source-only release (default) ──────────────────────────────────────
  package-source:
    name: Package — Source Only
    needs: version
    runs-on: ubuntu-latest
    if: |
      needs.version.outputs.bump != 'skip' &&
      needs.version.outputs.with_launchers == 'false'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          # Check out the tagged commit so the zip reflects the bumped version
          ref: v${{ needs.version.outputs.new_v }}

      - name: Prepare README
        run: |
          mkdir -p how-to 
          cp cp lite/{how-to-install.pdf,README.md} how-to/

      - name: Build aperio-lite.zip
        run: |
          ZIP_NAME="aperio-lite.zip"

          zip -r "$ZIP_NAME" . -x ${{ env.ZIP_EXCLUDES }} "$ZIP_NAME"
          zip -u "$ZIP_NAME" README.md   # ensure README lands at root

          SHA=$(shasum -a 256 "$ZIP_NAME" | awk '{print $1}')
          echo "RELEASE_BODY=- \`$ZIP_NAME\` (SHA256: \`$SHA\`)" >> "$GITHUB_ENV"

          echo "✅ Created $ZIP_NAME"
          unzip -l "$ZIP_NAME" | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_v }}
          name:     Release v${{ needs.version.outputs.new_v }}
          body: |
            ### 📦 Downloads
            ${{ env.RELEASE_BODY }}

            ---
            **Signed by:** 🏆 Project Lead - L.K.
          generate_release_notes: false
          files: aperio-lite.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ── 2b. Launcher-binary release (opt-in) ───────────────────────────────────
  package-launchers:
    name: Package — With Launcher Binaries
    needs: version
    runs-on: ubuntu-latest
    if: |
      needs.version.outputs.bump != 'skip' &&
      needs.version.outputs.with_launchers == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          ref: v${{ needs.version.outputs.new_v }}

      # Trigger the launcher build workflow and wait for it to finish.
      # headBranch is empty for tag-triggered runs, so we trigger explicitly
      # and then watch the run by its ID rather than filtering on branch name.
      - name: Trigger Launcher Workflow & Wait
        id: launcher
        run: |
          TAG="v${{ needs.version.outputs.new_v }}"

          echo "🚀 Triggering launcher workflow for $TAG..."
          gh workflow run cd.aperio-lite-launchers.yml --ref "$TAG"

          # Allow a few seconds for the run to register
          sleep 10

          RUN_ID=$(gh run list \
            --workflow cd.aperio-lite-launchers.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "⏳ Waiting for launcher run $RUN_ID..."
          gh run watch "$RUN_ID"
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}

      - name: Download Launcher Binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          run-id: ${{ steps.launcher.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare README
        run: cp lite/how-to-install.md README.md

      - name: Build Per-Platform Zips
        id: packer
        run: |
          touch release_summary.txt

          for platform_path in dist/*/; do
            [ -d "$platform_path" ] || continue

            platform=$(basename "$platform_path")
            ZIP_NAME="aperio-lite-$platform.zip"
            echo "📦 Packaging $platform..."

            # Base source zip
            zip -r "$ZIP_NAME" . -x ${{ env.ZIP_EXCLUDES }} "$ZIP_NAME"

            # README at root
            zip -u "$ZIP_NAME" README.md

            # Binary/launcher — strip the dist/platform/ prefix with -j
            chmod +x "$platform_path"/*
            zip -j "$ZIP_NAME" "$platform_path"/*

            SHA=$(shasum -a 256 "$ZIP_NAME" | awk '{print $1}')
            echo "- \`$ZIP_NAME\` (SHA256: \`$SHA\`)" >> release_summary.txt

            echo "✅ Created $ZIP_NAME"
            unzip -l "$ZIP_NAME" | grep -E "README\.md|$(basename "$platform_path"/*)".
          done

          # Export multiline summary as a step output
          {
            echo 'RELEASE_BODY<<EOF'
            cat release_summary.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_v }}
          name:     Release v${{ needs.version.outputs.new_v }}
          body: |
            ### 📦 Dedicated Launcher Downloads
            ${{ steps.packer.outputs.RELEASE_BODY }}

            ---
            **Signed by:** 🏆 Project Lead - L.K.
          generate_release_notes: false
          files: aperio-lite-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}