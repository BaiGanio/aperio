name: (cd) Release & Versioning

on:
  push:
    branches: [master, beta-m*]

env:
  ZIP_EXCLUDES: >-
    .git/* .github/* .lancedb/* node_modules/*
    db/migrations/* docker/* docs/* tests/*
    lite/* deno.json deno.lock .c8rc dist/*
    launchers/* release_summary.txt README.md how-to/*

# =============================================================================
jobs:

  version:
    name: Analyze & Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    outputs:
      new_v:        ${{ steps.versioning.outputs.new_v }}
      bump:         ${{ steps.info.outputs.bump }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.MY_PAT }}
          fetch-depth: 0

      # Determine bump type and whether launcher binaries are requested.
      # Convention: feat(launchers): or fix(launchers): opts into the binary path.
      - name: Analyze Commit
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)

          if   [[ "$MSG" =~ ^feat\(launchers\): ]]; then BUMP="minor"; WITH_LAUNCHERS="true"
          elif [[ "$MSG" =~ ^fix\(launchers\):  ]]; then BUMP="patch"; WITH_LAUNCHERS="true"
          elif [[ "$MSG" =~ ^feat:              ]]; then BUMP="minor"; WITH_LAUNCHERS="false"
          elif [[ "$MSG" =~ ^fix:               ]]; then BUMP="patch"; WITH_LAUNCHERS="false"
          else                                          BUMP="skip";  WITH_LAUNCHERS="false"
          fi

          echo "bump=$BUMP"                   >> "$GITHUB_OUTPUT"
          echo "with_launchers=$WITH_LAUNCHERS" >> "$GITHUB_OUTPUT"
          echo "→ bump=$BUMP  with_launchers=$WITH_LAUNCHERS"

      - name: Configure Git
        if: steps.info.outputs.bump != 'skip'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: versioning
        if: steps.info.outputs.bump != 'skip'
        run: |
          # If this is a beta release, append -beta.1
          if [[ "${{ github.ref_name }}" == beta-m* ]]; then
            # Get last tag to increment beta number
            LAST_BETA=$(git tag -l "*-beta*" --sort=-version:refname | head -1)
            
            if [[ $LAST_BETA =~ -beta\.([0-9]+)$ ]]; then
              BETA_NUM=$((${BASH_REMATCH[1]} + 1))
            else
              BETA_NUM=1
            fi
            
            BASE_VERSION=$(node -p "require('./package.json').version" | sed 's/-beta.*//')
            BETA_VERSION="${BASE_VERSION}-beta.${BETA_NUM}"
            npm version $BETA_VERSION --no-git-tag-version
          else
            npm version ${{ steps.info.outputs.bump }} --no-git-tag-version
          fi
          NEW_V=$(node -p "require('./package.json').version")
          echo "new_v=$NEW_V" >> "$GITHUB_OUTPUT"

      - name: Write version for landing page
        if: steps.info.outputs.bump != 'skip'
        run: |
          sed -i "s/const version = '.*';/const version = '${{ steps.versioning.outputs.new_v }}';/" docs/scripts.js

      - name: Commit & Tag Version Bump
        if: steps.info.outputs.bump != 'skip'
        run: |
          set -euo pipefail
          NEW_V="${{ steps.versioning.outputs.new_v }}"

          git add package.json package-lock.json docs/scripts.js
          git commit -m "chore: release v$NEW_V [skip ci]"

          # MY_PAT is required — GITHUB_TOKEN pushes never trigger downstream workflows
          git remote set-url origin \
            https://x-access-token:${{ secrets.MY_PAT }}@github.com/${{ github.repository }}

          echo "→ creating tag v$NEW_V..."
          git tag -f "v$NEW_V"

          echo "→ pushing tag..."
          git push origin "v$NEW_V" --force

          echo "→ pushing branch..."
          git push origin HEAD:${{ github.ref_name }}

          echo "→ verifying tag exists on remote..."
          git ls-remote --tags origin "refs/tags/v$NEW_V"
          echo "✅ tag confirmed on remote"

  package-source:
    name: Package — Source Only
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.version.outputs.new_v != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.MY_PAT }}
          ref: v${{ needs.version.outputs.new_v }}

      - name: Prepare README
        run: |
          mkdir -p how-to 
          cp .github/lite/{how-to-install.pdf,uninstall.sh} how-to/

      - name: Build ZIP
        run: |
          ZIP_NAME="aperio-lite-v${{ needs.version.outputs.new_v }}.zip"

          zip -r "$ZIP_NAME" . \
            -x ".git/*" ".github/*" ".lancedb/*" "node_modules/*" \
            -x "db/migrations/*" "docker/*" "docs/*" "tests/*" \
            -x "lite/*" "deno.json" "deno.lock" "dist/*" \
            -x "launchers/*" "release_summary.txt" "README.md" "how-to/*" ".c8rc" \
            -x "$ZIP_NAME"
          zip -u "$ZIP_NAME" how-to/*

          SHA=$(shasum -a 256 "$ZIP_NAME" | awk '{print $1}')
          echo "RELEASE_BODY=- \`$ZIP_NAME\` (SHA256: \`$SHA\`)" >> "$GITHUB_ENV"

          echo "✅ Created $ZIP_NAME"
          unzip -l "$ZIP_NAME" | head -30

      - name: Create GitHub Release (draft)
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ needs.version.outputs.new_v }}
          name: Release v${{ needs.version.outputs.new_v }}${{ contains(needs.version.outputs.new_v, 'beta') && ' (Beta)' || '' }}
          body: |
            ### 📦 Downloads
            ${{ env.RELEASE_BODY }}

            ---
            **Signed by:** 🏆 Project Lead - L.K.
          generate_release_notes: false
          draft: true  
          prerelease: ${{ contains(needs.version.outputs.new_v, 'beta') }}
          files: aperio-lite-v${{ needs.version.outputs.new_v }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP Asset
        run: |
          gh release upload \
            "v${{ needs.version.outputs.new_v }}" \
            "aperio-lite-v${{ needs.version.outputs.new_v }}.zip" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        run: |
          gh release edit "v${{ needs.version.outputs.new_v }}" \
            --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}