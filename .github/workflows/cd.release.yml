# cd.release.yml — now downloads binaries and packs them into the zip
name: (cd) Release & Versioning

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          fetch-depth: 0

      - name: Analyze Commit
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^feat: ]]; then BUMP="minor"
          elif [[ "$MSG" =~ ^fix: ]]; then BUMP="patch"
          else BUMP="skip"
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.info.outputs.bump != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: versioning
        if: steps.info.outputs.bump != 'skip'
        run: |
          npm version ${{ steps.info.outputs.bump }} --no-git-tag-version
          NEW_V=$(node -p "require('./package.json').version")
          echo "new_v=$NEW_V" >> $GITHUB_OUTPUT

      - name: Write version for landing page
        if: steps.info.outputs.bump != 'skip'
        run: |
          sed -i "s/const version = '.*';/const version = '${{ steps.versioning.outputs.new_v }}';/" docs/scripts.js

      - name: Commit & Tag Version Bump
        if: steps.info.outputs.bump != 'skip'
        run: |
          set -euo pipefail
          NEW_V="${{ steps.versioning.outputs.new_v }}"
          git add package.json package-lock.json docs/scripts.js
          git commit -m "chore: release v$NEW_V [skip ci]"

          # Use MY_PAT — GITHUB_TOKEN pushes never trigger downstream workflows
          git remote set-url origin https://x-access-token:${{ secrets.MY_PAT }}@github.com/${{ github.repository }}

          echo "→ creating tag v$NEW_V..."
          git tag "v$NEW_V"

          echo "→ pushing tag first (triggers launcher workflow)..."
          git push origin "v$NEW_V"

          echo "→ pushing master..."
          git push origin master

          echo "→ verifying tag exists on remote..."
          git ls-remote --tags origin "refs/tags/v$NEW_V"
          echo "✅ tag confirmed on remote"

      # ── Wait for the launcher workflow triggered by the tag above ─────────────
      # headBranch is empty for tag-triggered runs — filter on headSha or the
      # displayTitle instead. We use `--event push` + the tag ref to narrow it,
      # then check `conclusion` (not `status`) to know it actually succeeded.
      - name: Trigger Launcher and Wait
        if: steps.info.outputs.bump != 'skip'
        run: |
          NEW_V="${{ steps.versioning.outputs.new_v }}"
          TAG="v$NEW_V"

          echo "🚀 Explicitly triggering launcher workflow for $TAG..."
          gh workflow run cd.aperio-lite-launchers.yml --ref "$TAG"

          # Give a few seconds to initialize the run
          sleep 10

          # Get the ID of the run we just started
          RUN_ID=$(gh run list --workflow cd.aperio-lite-launchers.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "LAUNCHER_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

          echo "⏳ Waiting for run $RUN_ID to complete..."
          gh run watch "$RUN_ID"
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }} # Use your PAT here to ensure it has permission

      - name: Download launcher binaries
        if: steps.info.outputs.bump != 'skip'
        uses: actions/download-artifact@v4
        with:
          path: dist/
          # Download artifacts from the launcher run specifically
          run-id: ${{ env.LAUNCHER_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dedicated Launcher Zips
        id: packer_lite
        if: steps.info.outputs.bump != 'skip'
        run: |
          # 1. Prepare README for the zip
          cp lite/how-to-install.md README.md
          
          # Initialize the summary file
          touch release_summary.txt

          # 2. Loop through each platform directory in dist/
          for platform_path in dist/*; do
            if [ -d "$platform_path" ]; then
              platform=$(basename "$platform_path")
              ZIP_NAME="aperio-lite-$platform.zip"
              echo "📦 Packaging platform: $platform..."

              # Create the base zip with source code (run from root)
              # Exclude patterns are now correctly relative to '.'
              zip -r "$ZIP_NAME" . -x \
                ".git/*" ".github/*" ".lancedb/*" "node_modules/*" \
                "db/migrations/*" "docker/*" "docs/*" "tests/*" \
                "lite/*" "deno.json" "deno.lock" "dist/*" \
                "launchers/*" "$ZIP_NAME" "release_summary.txt" "README.md"

              # Add the README specifically (to ensure it's at root)
              zip -u "$ZIP_NAME" README.md

              # Add the launcher executable(s) from the platform folder
              # Ensure the binary has executable permissions BEFORE zipping
              chmod +x "$platform_path"/*
              # -j (junk paths) strips "dist/windows/" and puts "launcher.exe" at the zip root
              zip -j "$ZIP_NAME" "$platform_path"/*

              # Calculate SHA256
              SHA_VALUE=$(shasum -a 256 "$ZIP_NAME" | awk '{print $1}')
              echo "- \`$ZIP_NAME\` (SHA256: \`$SHA_VALUE\`)" >> release_summary.txt
              
              echo "✅ Created $ZIP_NAME"
              unzip -l "$ZIP_NAME" | grep -E "README.md|$platform" # Debug: show contents
            fi
          done

          # 3. Export the summary for the release body
          {
            echo 'RELEASE_BODY<<EOF'
            cat release_summary.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.info.outputs.bump != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.new_v }}
          name: Release v${{ steps.versioning.outputs.new_v }}
          body: |
            ### 📦 Dedicated Launcher Downloads
            ${{ steps.packer_lite.outputs.RELEASE_BODY }}

            ---
            **Signed by:** 🏆 Project Lead - L.K.
            ---
          generate_release_notes: false
          files: aperio-lite-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}