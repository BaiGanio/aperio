# cd.release.yml — now downloads binaries and packs them into the zip
name: (cd) Release & Versioning

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          fetch-depth: 0

      - name: Analyze Commit
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^feat: ]]; then BUMP="minor"
          elif [[ "$MSG" =~ ^fix: ]]; then BUMP="patch"
          else BUMP="skip"
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.info.outputs.bump != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: versioning
        if: steps.info.outputs.bump != 'skip'
        run: |
          npm version ${{ steps.info.outputs.bump }} --no-git-tag-version
          NEW_V=$(node -p "require('./package.json').version")
          echo "new_v=$NEW_V" >> $GITHUB_OUTPUT

      - name: Write version for landing page
        if: steps.info.outputs.bump != 'skip'
        run: |
          sed -i "s/const version = '.*';/const version = '${{ steps.versioning.outputs.new_v }}';/" docs/scripts.js

      - name: Commit & Tag Version Bump
        if: steps.info.outputs.bump != 'skip'
        run: |
          set -euo pipefail
          NEW_V="${{ steps.versioning.outputs.new_v }}"
          git add package.json package-lock.json docs/scripts.js
          git commit -m "chore: release v$NEW_V [skip ci]"

          # Use MY_PAT — GITHUB_TOKEN pushes never trigger downstream workflows
          git remote set-url origin https://x-access-token:${{ secrets.MY_PAT }}@github.com/${{ github.repository }}

          echo "→ creating tag v$NEW_V..."
          git tag "v$NEW_V"

          echo "→ pushing tag first (triggers launcher workflow)..."
          git push origin "v$NEW_V"

          echo "→ pushing master..."
          git push origin master

          echo "→ verifying tag exists on remote..."
          git ls-remote --tags origin "refs/tags/v$NEW_V"
          echo "✅ tag confirmed on remote"

      # ── Wait for the launcher workflow triggered by the tag above ─────────────
      # headBranch is empty for tag-triggered runs — filter on headSha or the
      # displayTitle instead. We use `--event push` + the tag ref to narrow it,
      # then check `conclusion` (not `status`) to know it actually succeeded.
      - name: Wait for launcher builds
        if: steps.info.outputs.bump != 'skip'
        run: |
          NEW_V="${{ steps.versioning.outputs.new_v }}"
          TAG="v$NEW_V"
          echo "Waiting for launcher workflow triggered by tag $TAG..."

          # Give GitHub a moment to register the tag-triggered run
          sleep 15

          RUN_ID=""

          # Phase 1 — find the run ID
          # Wait longer before first poll — tag event + workflow queue takes time
          sleep 30

          echo "--- DEBUG: all recent runs ---"
          gh run list             --repo "${{ github.repository }}"             --limit=10             --json databaseId,headBranch,displayTitle,status,event,workflowName             --jq '.[] | {id:.databaseId, workflow:.workflowName, branch:.headBranch, title:.displayTitle, status:.status, event:.event}'             || true
          echo "--- DEBUG: tag exists on remote? ---"
          git ls-remote --tags origin | grep "$TAG" || echo "  ❌ tag NOT found on remote"
          echo "--- END DEBUG ---"

          for i in $(seq 1 30); do
            RUN_ID=$(gh run list               --repo "${{ github.repository }}"               --workflow=cd.aperio-lite-launchers.yml               --limit=10               --json databaseId,headBranch,displayTitle,status               --jq ".[] | select(.headBranch == \"$TAG\") | .databaseId"               | head -1)

            if [[ -n "$RUN_ID" ]]; then
              echo "  Found run: $RUN_ID"
              break
            fi
            echo "  attempt $i: run not found yet, retrying..."
            sleep 10
          done

          if [[ -z "$RUN_ID" ]]; then
            echo "❌ Launcher workflow run never appeared for tag $TAG"
            exit 1
          fi

          # Export for the download step
          echo "LAUNCHER_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

          # Phase 2 — wait for it to complete (up to 10 min)
          for i in $(seq 1 30); do
            CONCLUSION=$(gh run view "$RUN_ID" \
              --json status,conclusion \
              --jq '"status=\(.status) conclusion=\(.conclusion)"')
            echo "  attempt $i: $CONCLUSION"

            STATUS=$(gh run view "$RUN_ID" --json status --jq '.status')
            if [[ "$STATUS" == "completed" ]]; then
              CONCLUSION=$(gh run view "$RUN_ID" --json conclusion --jq '.conclusion')
              if [[ "$CONCLUSION" != "success" ]]; then
                echo "❌ Launcher workflow completed with conclusion: $CONCLUSION"
                exit 1
              fi
              echo "✅ Launcher builds completed successfully"
              break
            fi
            sleep 20
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download launcher binaries
        if: steps.info.outputs.bump != 'skip'
        uses: actions/download-artifact@v4
        with:
          path: dist/
          # Download artifacts from the launcher run specifically
          run-id: ${{ env.LAUNCHER_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Lite Zip (source + binaries)
        id: packer_lite
        if: steps.info.outputs.bump != 'skip'
        run: |
          mkdir -p launchers
          find dist/ -type f | while read f; do
            cp "$f" launchers/
          done

          cp lite/how-to-install.md README.md

          zip -r aperio-lite.zip . -x \
            "*.git/*" \
            "*.github/*" \
            "*.lancedb/*" \
            "node_modules/*" \
            "db/migrations/*" \
            "docker/*" \
            "docs/*" \
            "tests/*" \
            "lite/*" \
            "deno.json" \
            "deno.lock" \
            "dist/*"

          SHA_VALUE=$(shasum -a 256 aperio-lite.zip | awk '{print $1}')
          echo "sha_lite=${SHA_VALUE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.info.outputs.bump != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.new_v }}
          name: Release v${{ steps.versioning.outputs.new_v }}
          body: |
            ### 📦 Downloads
            - `aperio-lite.zip` — includes launcher binaries for all platforms

            ### 🔐 Verify Authenticity
            **aperio-lite.zip SHA256:** `${{ steps.packer_lite.outputs.sha_lite }}`

            ---
            **Signed by:** 🏆 Project Lead - L.K.
            ---
          generate_release_notes: false
          files: aperio-lite.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}