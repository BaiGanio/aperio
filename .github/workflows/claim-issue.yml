name: Issue Auto-Claim (Max 3)

on:
  issue_comment:
    types: [created]

jobs:
  check_and_claim:
    if: contains(github.event.comment.body, '/claim')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repo (for blocklist)
        uses: actions/checkout@v4

      - name: Process Claim Request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = context.payload.comment.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;

            // 1. BLOCKLIST GUARD
            let blockedUsers = [];
            try {
              const raw = fs.readFileSync('.github/blocklist.json', 'utf8');
              blockedUsers = JSON.parse(raw).blocked.map(u => u.toLowerCase());
            } catch (e) {
              console.log('No blocklist found or failed to parse — skipping block check.');
            }
            if (blockedUsers.includes(username.toLowerCase())) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `> [!CAUTION]\n> @${username} You are not permitted to claim issues on this project.`
              });
              return;
            }

            // 2. Fetch the issue to inspect its labels
            const issue = await github.rest.issues.get({
              owner, repo, issue_number: issueNumber
            });
            const labels = issue.data.labels.map(l => l.name.toLowerCase());

            // 3. BOUNTY GUARD — reject claim if no bounty label is present
            const hasBounty = labels.some(l => l.startsWith('bounty') || l.includes('$'));
            if (!hasBounty) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `> [!WARNING]\n> @${username} This issue does not have a bounty label and is not available for claiming. Only labeled bounty issues can be claimed.`
              });
              return;
            }

            // 4. ALREADY CLAIMED GUARD — reject if issue is already assigned
            if (issue.data.assignee) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `> [!WARNING]\n> @${username} This issue is already claimed by @${issue.data.assignee.login}.`
              });
              return;
            }

            // 5. MAX CLAIMS GUARD
            const claimedIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: 'status: claimed',
              state: 'open'
            });
            const userClaims = claimedIssues.data.filter(i =>
              i.assignee && i.assignee.login === username
            );
            if (userClaims.length >= 3) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `> [!CAUTION]\n> Sorry @${username}, you already have **3 active claims**. Please submit a PR for your existing tasks before claiming more.`
              });
              return;
            }

            // 6. All checks passed — assign and label
            await github.rest.issues.addLabels({
              owner, repo, issue_number: issueNumber,
              labels: ['status: claimed']
            });
            await github.rest.issues.update({
              owner, repo, issue_number: issueNumber,
              assignees: [username]
            });
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: `> [!NOTE]\n> ✅ **Claimed!** @${username}, this issue is now yours. A PR is expected within **7 days** — if none is submitted, the issue will be reopened for others. Please link this issue in your Pull Request when done.`
            });