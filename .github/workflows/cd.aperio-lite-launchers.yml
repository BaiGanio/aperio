name: Build Aperio Launcher

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: aperio-linux
            ext: ""

          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
            artifact: aperio-win
            ext: ".exe"

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: aperio-mac-arm
            ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: aperio-mac-intel
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x   # always latest Deno 2

      - name: Compile
        run: |
          deno compile \
            --target ${{ matrix.target }} \
            --allow-net \
            --allow-env \
            --allow-run \
            --allow-read \
            --allow-write \
            --allow-sys \
            --output bin/${{ matrix.artifact }}${{ matrix.ext }} \
            src/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only create a GitHub Release when a tag was pushed
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true   # auto-generates changelog from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}