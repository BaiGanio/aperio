# build only, no release
name: Build Aperio Launchers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: aperio-linux
            ext: ""
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
            artifact: aperio-win
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: aperio-mac-arm
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: aperio-mac-intel
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: |
          deno compile \
            --target ${{ matrix.target }} \
            --allow-net --allow-env --allow-run \
            --allow-read --allow-write --allow-sys \
            --output ${{ matrix.artifact }}${{ matrix.ext }} \
            src/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}  # ← was pointing to bin/ which doesn't exist
          retention-days: 7