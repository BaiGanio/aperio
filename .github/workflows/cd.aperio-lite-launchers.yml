name: (cd) Build Launchers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
            ext: ""
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
            artifact: win
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mac-arm
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mac-intel
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Compile
        run: |
          deno compile \
            --target ${{ matrix.target }} \
            --allow-net --allow-env --allow-run \
            --allow-read --allow-write --allow-sys \
            --output ${{ matrix.artifact }}${{ matrix.ext }} \
            lite/src/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}  # ← was pointing to bin/ which doesn't exist
          retention-days: 7