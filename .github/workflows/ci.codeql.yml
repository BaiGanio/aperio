name: (ci) CodeQL Advanced

on:
  push:
    branches: [ "master" ]
    # RESOLVES: "Global Triggers" -> "Path-Sensitive"
    # Only runs if files in these directories change
    paths:
      - 'src/**'
      - 'lib/**'
      - '.github/workflows/reusable/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**'
      - 'lib/**'
  schedule:
    - cron: '17 8 * * 0'

jobs:
  call-security-template:
    uses: .github/workflows/reusable.security-scan.yml@master
    with:
      # Defines the matrix configuration here (The "What")
      languages: '[{"language": "actions", "build-mode": "none"}, {"language": "javascript-typescript", "build-mode": "none"}]'