name: (ci) lite smoke

# Keeps the lite install path from silently rotting. On every change to the
# server boot path or the launchers, on all three OSes: install deps, syntax-
# check the launchers, boot `node server.js` headless and assert it answers
# `/api/bootstrap/state` (the endpoint is up as soon as the HTTP server listens
# — no llama.cpp engine, model download, or bootstrap required). This is exactly the class of
# breakage — a launcher/zip/boot regression that ships green — that let the
# launcher-less zip go unnoticed.

on:
  workflow_dispatch:
  push:
    branches: [master, dev]
    paths:
      - server.js
      - bootstrap.js
      - lib/**
      - db/**
      - mcp/**
      - package.json
      - package-lock.json
      - .github/lite/**
      - .github/workflows/ci.lite-smoke.yml
  pull_request:
    branches: [master, dev]
    paths:
      - server.js
      - bootstrap.js
      - lib/**
      - db/**
      - mcp/**
      - package.json
      - package-lock.json
      - .github/lite/**
      - .github/workflows/ci.lite-smoke.yml

permissions:
  contents: read

jobs:
  boot:
    name: boot & answer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      PORT: "31337"
      DB_BACKEND: sqlite
      EMBEDDING_PROVIDER: transformers
      APERIO_LITE: "on"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check shell launchers
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for f in .github/lite/install.sh .github/lite/START.sh .github/lite/launch-hidden.sh .github/lite/uninstall.sh; do
            bash -n "$f" && echo "  ok  $f"
          done

      - name: Parse-check PowerShell launchers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem .github/lite/assets/*.ps1 | ForEach-Object {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs) | Out-Null
            if ($errs) { throw "Parse errors in $($_.Name): $($errs -join '; ')" }
            "  ok  $($_.Name)"
          }

      - name: Boot server headless & assert it answers
        shell: bash
        run: |
          node server.js & SRV=$!
          ok=0
          for _ in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/bootstrap/state" -o state.json 2>/dev/null; then
              ok=1; break
            fi
            kill -0 "$SRV" 2>/dev/null || { echo "✖ server exited before answering"; break; }
            sleep 1
          done
          kill "$SRV" 2>/dev/null || true
          if [ "$ok" = "1" ]; then
            echo "✔ /api/bootstrap/state answered:"; cat state.json
          else
            echo "✖ no answer on /api/bootstrap/state within 90s"; exit 1
          fi
