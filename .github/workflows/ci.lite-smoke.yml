name: (ci) lite smoke

# Keeps the lite install path from silently rotting. On every change to the
# server boot path or the launchers, on all three OSes: install deps, syntax-
# check the launchers, boot `node server.js` headless and assert it answers
# `/api/bootstrap/state` (the endpoint is up as soon as the HTTP server listens
# — no llama.cpp engine, model download, or bootstrap required). This is exactly the class of
# breakage — a launcher/zip/boot regression that ships green — that let the
# launcher-less zip go unnoticed.

on:
  workflow_dispatch:
  push:
    branches: [master, dev]
    paths:
      - server.js
      - bootstrap.js
      - lib/**
      - db/**
      - mcp/**
      - package.json
      - package-lock.json
      - .github/lite/**
      - .github/workflows/ci.lite-smoke.yml
  pull_request:
    branches: [master, dev]
    paths:
      - server.js
      - bootstrap.js
      - lib/**
      - db/**
      - mcp/**
      - package.json
      - package-lock.json
      - .github/lite/**
      - .github/workflows/ci.lite-smoke.yml

permissions:
  contents: read

jobs:
  boot:
    name: boot & answer (${{ matrix.os }} / ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      PORT: "31337"
      DB_BACKEND: sqlite
      EMBEDDING_PROVIDER: transformers
      APERIO_LITE: "on"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify ARM runner selection
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          echo "runner.arch=${RUNNER_ARCH}"
          test "$RUNNER_ARCH" = ARM64

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check shell launchers
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for f in .github/lite/install.sh .github/lite/START.sh .github/lite/launch-hidden.sh .github/lite/uninstall.sh; do
            bash -n "$f" && echo "  ok  $f"
          done

      - name: Parse-check PowerShell launchers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem .github/lite/assets/*.ps1 | ForEach-Object {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs) | Out-Null
            if ($errs) { throw "Parse errors in $($_.Name): $($errs -join '; ')" }
            "  ok  $($_.Name)"
          }

      - name: Run shared installation smoke contract (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash vms/smoke.sh .

      - name: Run shared installation smoke contract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vms\smoke.ps1 .
