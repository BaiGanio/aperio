name: ci PR Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title Format
        id: lint
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ ^(feat|fix|chore|refactor|docs): ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Find Existing Lint Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pr-lint -->'

      - name: Post or Update Warning
        if: steps.lint.outputs.valid == 'false'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- pr-lint -->
            ⚠️ **PR Title Format Warning**

            Your PR title does not follow the required convention:
            ```
            feat: ...   fix: ...   chore: ...   refactor: ...   docs: ...
            ```
            **Current title:** *${{ github.event.pull_request.title }}*

            PRs with non-conforming titles will be **skipped in the automated CHANGELOG** upon merge.
            Please update the title to proceed.

      - name: Remove Warning if Fixed
        if: steps.lint.outputs.valid == 'true' && steps.fc.outputs.comment-id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X DELETE /repos/${{ github.repository }}/issues/comments/${{ steps.fc.outputs.comment-id }}