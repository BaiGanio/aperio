name: Update Changelog

on:
  push:
    branches: [master]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine section
        id: section
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" == feat:* ]]; then echo "section=Added" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == fix:* ]]; then echo "section=Fixed" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == chore:* || "$MSG" == refactor:* ]]; then echo "section=Changed" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == docs:* ]]; then echo "section=Docs" >> $GITHUB_OUTPUT
          else echo "section=skip" >> $GITHUB_OUTPUT
          fi
          echo "msg=$MSG" >> $GITHUB_OUTPUT
          echo "hash=$(git log -1 --pretty=%h)" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        if: steps.section.outputs.section != 'skip'
        env:
          SECTION: ${{ steps.section.outputs.section }}
          ENTRY: "- ${{ steps.section.outputs.msg }} (`${{ steps.section.outputs.hash }}`)"
        run: |
          python3 -c "
import os
entry = os.environ['ENTRY']
section = os.environ['SECTION']
section_header = f'### {section}'
unreleased = '## [Unreleased]'
with open('CHANGELOG.md', 'r') as f:
    content = f.read()
if unreleased not in content:
    exit(0)
unreleased_block = content.split(unreleased)[1].split('## [')[0]
if section_header in unreleased_block:
    content = content.replace(section_header + '\n', section_header + '\n' + entry + '\n', 1)
else:
    content = content.replace(unreleased + '\n', unreleased + '\n\n' + section_header + '\n' + entry + '\n', 1)
with open('CHANGELOG.md', 'w') as f:
    f.write(content)
print(f'Added to {section}: {entry}')
"

      - name: Commit changelog update
        if: steps.section.outputs.section != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md || (
            git add CHANGELOG.md &&
            git commit -m "chore: update changelog [skip ci]" &&
            git push
          )