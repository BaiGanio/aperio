name: Release & Versioning (No Changelog)

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze Commit
        id: info
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^feat: ]]; then BUMP="minor"
          elif [[ "$MSG" =~ ^fix: ]]; then BUMP="patch"
          else BUMP="skip"
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.info.outputs.bump != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: versioning
        if: steps.info.outputs.bump != 'skip'
        run: |
          npm version ${{ steps.info.outputs.bump }} --no-git-tag-version
          NEW_V=$(node -p "require('./package.json').version")
          echo "new_v=$NEW_V" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        if: steps.info.outputs.bump != 'skip'
        run: |
          NEW_V="${{ steps.versioning.outputs.new_v }}"
          git add package.json package-lock.json
          git commit -m "chore: release v$NEW_V [skip ci]"
          git push origin master

      - name: Create GitHub Release
        if: steps.info.outputs.bump != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.new_v }}
          name: Release v${{ steps.versioning.outputs.new_v }}
          # This is the magic: GitHub builds the changelog for you!
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
