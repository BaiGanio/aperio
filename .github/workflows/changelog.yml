name: Update Changelog

on:
  push:
    branches: [master]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog entry from commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_HASH=$(git log -1 --pretty=%h)

          if [[ "$COMMIT_MSG" == feat:* ]]; then
            SECTION="Added"
          elif [[ "$COMMIT_MSG" == fix:* ]]; then
            SECTION="Fixed"
          elif [[ "$COMMIT_MSG" == chore:* ]] || [[ "$COMMIT_MSG" == refactor:* ]]; then
            SECTION="Changed"
          elif [[ "$COMMIT_MSG" == docs:* ]]; then
            SECTION="Docs"
          else
            echo "No conventional commit prefix — skipping changelog update"
            exit 0
          fi

          ENTRY="- ${COMMIT_MSG} (\`${COMMIT_HASH}\`)"

          python3 - <<PYEOF
import os

entry = """$ENTRY"""
section = "$SECTION"

with open("CHANGELOG.md", "r") as f:
    content = f.read()

section_header = f"### {section}"
unreleased = "## [Unreleased]"

if unreleased not in content:
    print("No [Unreleased] section found")
    exit(0)

unreleased_block = content.split(unreleased)[1].split("## [")[0]

if section_header in unreleased_block:
    content = content.replace(
        f"{section_header}\n",
        f"{section_header}\n{entry}\n",
        1
    )
else:
    content = content.replace(
        f"{unreleased}\n",
        f"{unreleased}\n\n{section_header}\n{entry}\n",
        1
    )

with open("CHANGELOG.md", "w") as f:
    f.write(content)

print(f"Added to {section}: {entry}")
PYEOF

      - name: Commit changelog update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md || (
            git add CHANGELOG.md &&
            git commit -m "chore: update changelog [skip ci]" &&
            git push
          )