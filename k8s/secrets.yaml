---
# Secrets for the Aperio stack.
# Generate the Postgres password with:
#   echo -n "YourAperioPassword" | base64
apiVersion: v1
kind: Secret
metadata:
  name: aperio-secrets
  namespace: aperio
  labels:
    app.kubernetes.io/part-of: aperio
type: Opaque
data:
  # ⚠️ Change these before deploying to production!
  postgres-password: YXBlcmlvX3NlY3JldA==       # "aperio_secret" (base64)
  # Anthropic API key — set to your actual key (base64-encoded)
  anthropic-api-key:                              # ""
  # DeepSeek / Gemini / Voyage keys — add as needed
