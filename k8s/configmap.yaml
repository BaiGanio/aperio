---
# ConfigMap — first-boot configuration for Aperio.
#
# EDIT THIS FILE BEFORE FIRST DEPLOY on your Pi. Uncomment the lines for
# the provider you want and set the values. If everything stays commented,
# Aperio uses its built-in defaults (ollama + transformers), then you can
# change them via the Web UI → Settings afterward.
#
# Once you save settings in the Web UI, they're stored in the database and
# override whatever is in this ConfigMap on every pod start. See details
# in k3s-instructions.md §6.4.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aperio-config
  namespace: aperio
  labels:
    app.kubernetes.io/part-of: aperio
data:
  # ── AI Provider ─────────────────────────────────────────────
  # Uncomment and set before first deploy. If left commented, Aperio
  # defaults to ollama (can be changed later from Web UI → Settings).
  #
  # Options:
  #   ollama       → local, needs Ollama running on your network
  #   anthropic    → cloud, needs ANTHROPIC_API_KEY (set in UI)
  #   deepseek     → cloud, needs DEEPSEEK_API_KEY (set in UI)
  #   gemini       → cloud, needs GEMINI_API_KEY (set in UI)
  #   claude-code  → uses Claude Pro/Max via Agent SDK
  #   codex        → uses Codex CLI
  #
  # AI_PROVIDER: "ollama"
  # OLLAMA_BASE_URL: "http://192.168.1.100:11434"

  # ── Embeddings ──────────────────────────────────────────────
  # Options:
  #   transformers → local (no API key, lightweight)
  #   voyage       → cloud (needs VOYAGE_API_KEY, set in UI)
  #
  # EMBEDDING_PROVIDER: "transformers"
