---
# Aperio — Deployment + ClusterIP Service.
#
# Aperio runs as a Node.js web server with an Express frontend and WebSocket
# streaming on port 31337 (local mode). It connects to its own Postgres database (in the same namespace)
# on a non-default port (8008) to avoid conflicts with other Postgres instances
# in the cluster.
#
# The image is built on GitHub CI (QEMU cross-compile for ARM64), pushed to
# ghcr.io, then pulled by k3s. For public repos the image is public — no
# imagePullSecrets needed. If your repo is private, add imagePullSecrets.
apiVersion: v1
kind: Service
metadata:
  name: aperio
  namespace: aperio
  labels:
    app: aperio
    app.kubernetes.io/part-of: aperio
spec:
  type: ClusterIP
  ports:
    - port: 31337
      targetPort: 31337
      name: http
  selector:
    app: aperio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aperio
  namespace: aperio
  labels:
    app: aperio
    app.kubernetes.io/part-of: aperio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aperio
  template:
    metadata:
      labels:
        app: aperio
    spec:
      containers:
        - name: aperio
          # Built in GitHub CI, pushed to ghcr.io
          image: ghcr.io/baiganio/aperio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 31337
              name: http
          envFrom:
            # First-boot defaults (AI provider, embeddings, etc.)
            # Overridable via Web UI → Settings (saved to DB, takes precedence)
            - configMapRef:
                name: aperio-config
          env:
            # ---- Database ----
            - name: DB_BACKEND
              value: "postgres"
            - name: DATABASE_URL
              value: "postgresql://aperio:$(POSTGRES_PASSWORD)@postgres.aperio.svc.cluster.local:8008/aperio"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aperio-secrets
                  key: postgres-password
            # ---- Security / Paths ----
            - name: APERIO_ALLOWED_PATHS_TO_READ
              value: "/app"
            - name: APERIO_ALLOWED_PATHS_TO_WRITE
              value: "/app/var"
            # Let DB-saved UI settings override env vars (default is "env")
            - name: APERIO_CONFIG_PRECEDENCE
              value: "db"
            # ---- Runtime ----
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "31337"
            - name: HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: var
              mountPath: /app/var
          readinessProbe:
            httpGet:
              path: /
              port: 31337
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 31337
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: var
          persistentVolumeClaim:
            claimName: aperio-var
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aperio-var
  namespace: aperio
  labels:
    app.kubernetes.io/part-of: aperio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi