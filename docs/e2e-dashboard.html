<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aperio E2E — Test Dashboard</title>
  <meta name="description" content="Aperio end-to-end test dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Berkeley+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .shell{max-width:1280px;margin:auto;padding:48px 28px 64px;position:relative;z-index:1}
    .e2e-header{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:32px}
    .e2e-title{margin:7px 0 4px;font-family:var(--font-ui);font-size:clamp(2.4rem,5.5vw,4.4rem);font-weight:400;line-height:1.1;letter-spacing:.03em}
    .e2e-lede{color:var(--subtle);max-width:650px;margin:0}
    .e2e-run{color:var(--muted);text-align:right;font:12px var(--font-mono)}
    .e2e-run strong{color:var(--text);display:block;font-family:var(--font-ui);font-size:14px}
    .grid{display:grid;gap:16px}

    /* Metric Cards */
    .metrics{grid-template-columns:1.35fr repeat(3,1fr)}
    .panel{background:var(--bg-card);border:1px solid var(--border);border-radius:0;box-shadow:0 20px 50px rgba(0,0,0,.25);transition:border-color .2s,transform .2s}
    .panel:hover{border-color:var(--border-hi)}
    .metric,.panel-pad{padding:22px}
    .metric{min-height:142px}
    .metric h2{margin:0 0 18px;color:var(--muted);font:11px var(--font-ui);font-weight:400;text-transform:uppercase;letter-spacing:.12em}
    .score{display:flex;align-items:baseline;gap:10px}
    .score b{font:700 49px/.9 var(--font-ui);letter-spacing:-.05em}
    .score span,small{color:var(--muted)}
    .meter{height:7px;background:var(--bg-raised);border-radius:0;overflow:hidden;margin-top:20px}
    .meter i,.bar i{display:block;height:100%;border-radius:0}
    .metric .value{font:700 29px var(--font-ui)}
    .metric small{display:block;margin-top:7px}

    /* Suite Cards */
    .suite-grid{display:grid;gap:16px;margin-top:16px}
    .suite-card{border:1px solid var(--border);background:var(--bg-card);box-shadow:0 20px 50px rgba(0,0,0,.25);transition:border-color .2s}
    .suite-card:hover{border-color:var(--border-hi)}
    .suite-head{padding:18px 22px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;user-select:none}
    .suite-head::-webkit-details-marker{display:none}
    .suite-head::before{content:'▸';color:var(--muted);font-size:13px;transition:transform .2s;margin-right:4px}
    details[open] .suite-head::before{content:'▾'}
    .suite-name{font:400 20px var(--font-ui);letter-spacing:.02em;color:var(--text)}
    .suite-meta{display:flex;gap:16px;align-items:center;font:12px var(--font-mono);color:var(--muted)}
    .suite-meta .tag{font:10px var(--font-ui);letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border-hi);border-radius:0}
    .tag-ok{color:var(--green)}
    .tag-fail{color:var(--amber)}

    /* Test Table */
    .suite-body{padding:0 22px 18px}
    .test-table{width:100%;border-collapse:collapse;font:13px var(--font-mono);margin-top:4px}
    .test-table th{text-align:left;color:var(--muted);font:10px var(--font-ui);font-weight:400;text-transform:uppercase;letter-spacing:.1em;padding:8px 6px 6px;border-bottom:1px solid var(--border)}
    .test-table td{padding:6px 6px;border-bottom:1px solid var(--border);vertical-align:top}
    .test-table tr:last-child td{border-bottom:0}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}
    .status-dot.pass{background:var(--green)}
    .status-dot.fail{background:var(--amber)}
    .status-dot.skip{background:var(--dim)}
    .test-name{display:flex;align-items:center;color:var(--text);word-break:break-word}
    .test-duration{color:var(--muted);white-space:nowrap;text-align:right}
    .test-error{color:var(--amber);font-size:11px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Footer & Legend */
    .legend{display:flex;justify-content:flex-end;align-items:center;gap:14px;margin-top:18px;color:var(--muted);font:11px var(--font-ui)}
    .legend i{width:13px;height:13px;border-radius:50%;display:inline-block}
    .status-gauge{display:flex;gap:3px;align-items:center}
    .status-gauge i{width:18px;height:8px;border-radius:0}

    .footer{display:flex;justify-content:space-between;align-items:center;margin-top:22px;color:var(--muted);font:11px var(--font-ui)}
    .footer a{color:var(--indigo);text-decoration:none}

    .empty-state{padding:40px;text-align:center;color:var(--muted);grid-column:1/-1}
    .empty-state h3{color:var(--text);margin:0 0 10px}

    .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:16px}
    .file-tile{background:var(--bg-card);border:1px solid var(--border);padding:14px;transition:border-color .2s}
    .file-tile:hover{border-color:var(--border-hi)}
    .file-tile .file-name{font:12px var(--font-mono);color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-tile .file-size{font:11px var(--font-mono);color:var(--dim)}
  </style>
</head>
<body>

<main class="shell">
  <!-- Header -->
  <div class="e2e-header">
    <div>
      <h1 class="e2e-title">⟐ E2E Tests</h1>
      <p class="e2e-lede">End-to-end verification suite — WebSocket lifecycle, streaming protocol, config provenance, settings round-trip, and UI config panel.</p>
    </div>
    <div class="e2e-run" id="run">
      <strong>e2e run</strong>loading…
    </div>
  </div>

  <!-- Metric Cards -->
  <div class="grid metrics" id="metrics"></div>

  <!-- Suite-by-suite results -->
  <div class="suite-grid" id="suites"></div>

  <!-- Test files -->
  <details style="margin-top:16px;border:1px solid var(--border);background:var(--bg-card)">
    <summary style="padding:14px 22px;cursor:pointer;font:13px var(--font-ui);color:var(--muted);user-select:none">
      Test files
    </summary>
    <div class="file-grid" id="files" style="padding:0 22px 18px"></div>
  </details>

  <!-- Legend -->
  <div class="legend">
    <span class="status-gauge"><i style="background:var(--green)"></i> pass</span>
    <span class="status-gauge"><i style="background:var(--amber)"></i> fail</span>
    <span class="status-gauge"><i style="background:var(--dim)"></i> skip</span>
    <span style="margin-left:8px">Totals reflect individual <code style="font:11px var(--font-mono);color:var(--text)">test()</code> calls, not suites.</span>
  </div>

  <div class="footer">
    <span><a href="coverage-dashboard.html">coverage</a> · <a href="index.html">index</a></span>
    <span>aperio · <a href="https://github.com/BaiGanio/aperio">github</a></span>
  </div>
</main>

<script src="e2e-data.js"></script>
<script>
const data = window.APERIO_E2E;
const pct = (v) => `${Number(v || 0).toFixed(1)}%`;
const fmt = (ms) => ms >= 1000 ? `${(ms / 1000).toFixed(2)}s` : `${Math.round(ms)}ms`;
const escapeHtml = (val) => String(val).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// Run info
document.querySelector('#run').innerHTML = `<strong>${data.branch || 'e2e run'}${data.commit ? ' · ' + data.commit : ''}</strong>Generated ${new Date(data.generatedAt).toLocaleString()} · ${data.total} tests · ${data.suites.length} suites`;

// Metrics
const passColor = data.passRate >= 100 ? 'var(--green)' : data.passRate >= 80 ? 'var(--amber)' : 'var(--amber)';
const durationColor = 'var(--cyan)';
document.querySelector('#metrics').innerHTML = `
  <article class="panel metric">
    <h2>pass rate</h2>
    <div class="score"><b style="color:${passColor}">${pct(data.passRate)}</b><span>${data.passed}/${data.total} tests</span></div>
    <div class="meter"><i style="width:${data.passRate}%;background:${passColor}"></i></div>
  </article>
  <article class="panel metric">
    <h2>failed</h2>
    <div class="value" style="color:${data.failed > 0 ? 'var(--amber)' : 'var(--green)'}">${data.failed}</div>
    <small>${data.passed} passed · ${data.skipped} skipped</small>
    <div class="meter"><i style="width:${data.total > 0 ? (data.failed / data.total * 100).toFixed(1) : 0}%;background:var(--amber)"></i></div>
  </article>
  <article class="panel metric">
    <h2>suites</h2>
    <div class="value" style="color:var(--purple)">${data.suites.length}</div>
    <small>${data.total} individual tests</small>
    <div class="meter"><i style="width:${data.suites.length ? Math.min(data.suites.filter(s => s.failed === 0).length / data.suites.length * 100, 100) : 0}%;background:var(--purple)"></i></div>
  </article>
  <article class="panel metric">
    <h2>duration</h2>
    <div class="value" style="color:${durationColor}">${fmt(data.duration_ms)}</div>
    <small>total wall-clock</small>
    <div class="meter"><i style="width:100%;background:var(--purple)"></i></div>
  </article>
`;

// Suites
const suitesHtml = data.suites.map((suite) => `
  <details class="suite-card"${suite.failed > 0 ? '' : ' open'}>
    <summary class="suite-head">
      <span class="suite-name">${escapeHtml(suite.name)}</span>
      <span class="suite-meta">
        <span class="tag ${suite.failed === 0 ? 'tag-ok' : 'tag-fail'}">${suite.failed === 0 ? 'pass' : suite.failed + ' fail'}</span>
        <span>${suite.passed}/${suite.testCount}</span>
        <span>${fmt(suite.duration_ms)}</span>
      </span>
    </summary>
    <div class="suite-body">
      <table class="test-table">
        <thead><tr><th>test</th><th style="text-align:right">duration</th></tr></thead>
        <tbody>
          ${suite.tests.map((t) => `
            <tr>
              <td><span class="test-name"><i class="status-dot ${t.status}"></i>${escapeHtml(t.name)}${t.status === 'skip' ? ' <span style="color:var(--dim);font-size:11px">(skipped)</span>' : ''}</span></td>
              <td class="test-duration">${fmt(t.duration_ms)}</td>
            </tr>
            ${t.error ? `<tr><td colspan="2" class="test-error" title="${escapeHtml(t.error)}">${escapeHtml(t.error)}</td></tr>` : ''}
          `).join('')}
        </tbody>
      </table>
    </div>
  </details>
`).join('') || '<div class="empty-state"><h3>No test data</h3><p>Run <code style="font:12px var(--font-mono)">npm run e2e:dashboard</code> to generate results.</p></div>';

document.querySelector('#suites').innerHTML = suitesHtml;

// Test files
const filesHtml = (data.files || []).map((f) => `
  <div class="file-tile">
    <span class="file-name">${escapeHtml(f.name)}</span>
    <span class="file-size">${(f.size / 1024).toFixed(1)} KB</span>
  </div>
`).join('') || '<div style="color:var(--muted);padding:18px 22px;font:12px var(--font-mono)">No test files found</div>';

document.querySelector('#files').innerHTML = filesHtml;
</script>
<script src="scripts.js"></script>
</body>
</html>
