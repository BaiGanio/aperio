<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aperio Coverage — Test Intelligence</title>
  <meta name="description" content="Aperio test coverage dashboard.">
  <style>
    :root{--ink:#f4f1e8;--muted:#a9aca8;--bg:#101313;--panel:#171b1b;--line:#303936;--mint:#b8f397;--cyan:#87d9d0;--amber:#f5c36b;--coral:#ff8f78;--purple:#c5a7ff}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 82% -12%,#263a34 0,transparent 35%),var(--bg);font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace}.shell{max-width:1280px;margin:auto;padding:34px 28px 56px}.eyebrow{color:var(--mint);letter-spacing:.14em;text-transform:uppercase;font-size:11px}header{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:28px}h1{margin:7px 0 4px;font:700 clamp(30px,5vw,58px)/.98 Georgia,serif;letter-spacing:-.04em}.lede{color:var(--muted);max-width:650px;margin:0}.run{color:var(--muted);text-align:right;font-size:12px}.run strong{color:var(--ink);display:block;font-size:14px}.grid{display:grid;gap:14px}.metrics{grid-template-columns:1.35fr repeat(3,1fr)}.panel{background:linear-gradient(145deg,rgba(255,255,255,.035),transparent 60%),var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px #0003}.metric,.panel-pad{padding:20px}.metric{min-height:142px}.metric h2{margin:0 0 18px;color:var(--muted);font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.12em}.score{display:flex;align-items:baseline;gap:10px}.score b{color:var(--mint);font:700 49px/.9 Georgia,serif;letter-spacing:-.05em}.score span,small{color:var(--muted)}.meter{height:7px;background:#28302d;border-radius:99px;overflow:hidden;margin-top:20px}.meter i,.bar i{display:block;height:100%;border-radius:inherit;background:var(--mint)}.metric .value{font:700 29px Georgia,serif}.metric small{display:block;margin-top:7px}.main{grid-template-columns:1.18fr .82fr;margin-top:14px}.heatmap{grid-column:1/-1}.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}h3{margin:0;font:700 20px Georgia,serif;letter-spacing:-.02em}.tag{color:var(--cyan);border:1px solid #31534f;border-radius:99px;padding:4px 9px;font-size:11px}.bars,.hotspots{display:grid;gap:16px}.bar-row{display:grid;grid-template-columns:155px 1fr 52px;align-items:center;gap:12px;color:var(--muted);font-size:12px}.bar{height:14px;background:#252d2a;border-radius:4px;overflow:hidden}.bar i{background:linear-gradient(90deg,var(--cyan),var(--mint))}.bar-row b{text-align:right;font-weight:400}.hotspot{display:grid;grid-template-columns:1fr auto;gap:8px;padding:12px 0;border-bottom:1px solid var(--line)}.hotspot:last-child{border-bottom:0}.hotspot code{font-size:12px}.hotspot span{color:var(--coral)}.hotspot small{grid-column:1/-1}.heat{display:grid;grid-template-columns:repeat(12,1fr);gap:5px}.cell{aspect-ratio:1;border-radius:4px;background:#3b4540}.cell:hover{outline:2px solid var(--ink)}.l1{background:#613b35}.l2{background:#956047}.l3{background:#b89053}.l4{background:#688c65}.l5{background:#a8d77e}.l6{background:var(--mint)}.legend{display:flex;justify-content:flex-end;align-items:center;gap:5px;margin-top:14px;color:var(--muted);font-size:11px}.legend i{width:13px;height:13px;border-radius:3px}.footer{display:flex;justify-content:space-between;align-items:center;margin-top:22px;color:var(--muted);font-size:11px}.dice{display:grid;grid-template-columns:repeat(3,6px);gap:4px;padding:10px;background:var(--mint);border-radius:10px;transform:rotate(8deg)}.dice i{width:6px;height:6px;border-radius:50%;background:#183027}@media(max-width:850px){.metrics,.main{grid-template-columns:1fr 1fr}.metrics .metric:first-child{grid-column:1/-1}header{align-items:start;flex-direction:column}.run{text-align:left}}@media(max-width:560px){.shell{padding:22px 15px 40px}.metrics,.main{grid-template-columns:1fr}.heat{grid-template-columns:repeat(8,1fr)}.bar-row{grid-template-columns:110px 1fr 45px}}
  </style>
</head>
<body>
<main class="shell">
  <header><div><div class="eyebrow">Aperio / test intelligence</div><h1>Coverage, remembered.</h1><p class="lede">What the test suite exercised—and where the next useful test is hiding.</p></div><div class="run" id="run"></div></header>
  <section class="grid metrics" id="metrics"></section>
  <section class="grid main"><article class="panel panel-pad"><div class="section-head"><h3>Coverage by signal</h3><span class="tag">server + MCP</span></div><div class="bars" id="groups"></div></article><article class="panel panel-pad"><div class="section-head"><h3>Next best tests</h3><span class="tag">priority</span></div><div class="hotspots" id="hotspots"></div></article><article class="panel panel-pad heatmap"><div class="section-head"><h3>File heatmap</h3><span class="tag">lower → higher</span></div><div class="heat" id="heat"></div><div class="legend"><span>lower</span><i class="l1"></i><i class="l2"></i><i class="l3"></i><i class="l4"></i><i class="l5"></i><i class="l6"></i><span>higher</span></div></article></section>
  <footer class="footer"><span>Generated from c8 LCOV data · <a href="https://codecov.io/gh/BaiGanio/aperio">open Codecov details</a></span><span class="dice"><i></i><i style="opacity:0"></i><i></i><i style="opacity:0"></i><i></i><i style="opacity:0"></i><i></i><i style="opacity:0"></i><i></i></span></footer>
</main>
<script src="coverage-data.js"></script>
<script>
  const data = window.APERIO_COVERAGE;
  const pct = (v) => `${Number(v || 0).toFixed(1)}%`;
  const meter = (v, color = '') => `<div class="meter"><i style="width:${v}%;${color ? `background:${color}` : ''}"></i></div>`;
  document.querySelector('#run').innerHTML = `<strong>${data.branch || 'coverage run'}</strong>Generated ${new Date(data.generatedAt).toLocaleString()} · ${data.files.length} files`;
  const t = data.totals;
  document.querySelector('#metrics').innerHTML = `<article class="panel metric"><h2>overall line coverage</h2><div class="score"><b>${pct(t.percent)}</b><span>${t.linesHit}/${t.linesFound} lines</span></div>${meter(t.percent)}</article><article class="panel metric"><h2>branches</h2><div class="value">${pct(t.branchesPercent)}</div><small>${t.branchesHit}/${t.branchesFound} paths</small>${meter(t.branchesPercent, 'var(--cyan)')}</article><article class="panel metric"><h2>functions</h2><div class="value">${pct(t.functionsPercent)}</div><small>${t.functionsHit}/${t.functionsFound} functions</small>${meter(t.functionsPercent, 'var(--purple)')}</article><article class="panel metric"><h2>files</h2><div class="value" style="color:var(--mint)">${data.files.length}</div><small>included by c8</small>${meter(t.percent, 'var(--amber)')}</article>`;
  document.querySelector('#groups').innerHTML = data.groups.map((g) => `<div class="bar-row"><span>${g.name}</span><div class="bar"><i style="width:${g.percent}%"></i></div><b>${pct(g.percent)}</b></div>`).join('');
  document.querySelector('#hotspots').innerHTML = data.files.slice(0, 4).map((f) => `<div class="hotspot"><code>${f.path}</code><span>${pct(f.percent)}</span><small>${f.linesHit}/${f.linesFound} executable lines covered</small></div>`).join('') || '<small>No LCOV files found.</small>';
  document.querySelector('#heat').innerHTML = data.files.map((f) => `<i class="cell l${Math.max(1, Math.min(6, Math.ceil(f.percent / 16.67)))}" title="${f.path}: ${pct(f.percent)}"></i>`).join('');
</script>
</body>
</html>
