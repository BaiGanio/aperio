<!DOCTYPE html>
<html lang="en" style="color-scheme: light dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Aperio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono:ital,wght@0,100..700;1,100..700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Prism syntax highlighting — NO external theme CSS (causes font override on dark themes) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js" defer></script>
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="styles/input-bar.css" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">A</div>
      Aperio
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar (⌘B)">
      <i class="bi bi-layout-sidebar"></i>
    </button>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <i class="bi bi-cpu" style="font-size:11px;color:var(--text-muted)"></i>
      <span id="statusText">connecting…</span>
      <span id="providerBadge" style="
        font-family:var(--font-mono); font-size:9px; font-weight:600;
        background:var(--tag-bg); color:var(--tag-text);
        padding:1px 6px; border-radius:8px; letter-spacing:0.06em;
        text-transform:uppercase; display:none;
      "></span>
    </div>
    <button id="reasoningToggle" onclick="toggleReasoning()"
      style="height:28px;padding:0 10px;border-radius:var(--radius-sm);border:1px solid var(--accent);
             background:var(--bg-hover);color:var(--accent);cursor:pointer;
             font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.06em;
             display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all var(--transition);">
      🧠 <span id="reasoningToggleLabel">reasoning on</span>
    </button>
    <!-- <div class="ctx-window" id="ctxWindow">
      <div class="ctx-header">
        <span class="ctx-label">context</span>
        <span class="ctx-value" id="ctxText">— / —</span>
      </div>
      <div class="ctx-track">
        <div class="ctx-fill" id="ctxFill"></div>
      </div>
    </div> -->
    <div class="theme-switcher">
      <button class="theme-btn" data-theme="light"  title="Light">☀️</button>
      <button class="theme-btn" data-theme="dark"   title="Dark">🌙</button>
      <button class="theme-btn" data-theme="aurora" title="Aurora">✦</button>
      <button class="theme-btn active" data-theme="system" title="System">⊙</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div style="display:flex; align-items:center; margin-bottom:10px;">
        <div class="sidebar-title" style="margin-bottom:0">Memories <span id="memoryCount" style="font-weight:400;opacity:.5"></span></div>
        <button id="exportBtn" title="Export brain to JSON"
          style="margin-left:6px; background:none; border:none; padding:2px 4px; cursor:pointer;
                 color:var(--text-muted); font-size:12px; border-radius:4px;
                 transition:all var(--transition);"
          onmouseover="this.style.opacity='1';this.style.color='var(--accent)'">
          <i class="bi bi-download"></i> Export
        </button>
        <!-- <button id="view-memories-btn" title="Show Memories" onclick="toggleMemoryView()" style="margin-left:6px; background:none; border:none; padding:2px 4px; cursor:pointer; color:var(--text-muted); font-size:12px; border-radius:4px; transition:all var(--transition);" onmouseover="this.style.opacity='1';this.style.color='var(--accent)'">📂 Show
        </button> -->
      </div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search memories…" />
      </div>
    </div>
    <div class="memories-list" id="memoriesList">
      <div class="empty-state" style="padding:24px 16px; text-align:center; line-height:1.8;">
        <div style="font-size:22px; margin-bottom:8px; opacity:.4">◈</div>
        <div style="font-size:12px; color:var(--text-muted)">Loading memories…</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <span id="version-display"></span>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="thinking" id="startup-thinking">
        <div class="avatar ai">A</div>
        <div class="thinking-dots">
          <div class="thinking-dots-row">
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
          </div>
          <div class="thinking-label">loading…</div>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <!-- <div class="attach-preview" id="attachPreview"></div> -->
      <div class="input-wrap">
        <!-- <button class="attach-btn" id="attachBtn" title="Attach file or image">
          <i class="bi bi-plus-lg"></i>
        </button>
        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.md,.js,.py,.html,.css,.json" multiple hidden> -->
        <textarea
          id="chatInput"
          placeholder="Ask anything — or say 'scan my project at ~/…'"
          rows="1"
        ></textarea>
        <span class="char-counter" id="charCounter"></span>
        <button class="send-btn" id="sendBtn" disabled title="Send (⌘↵)">
          <i class="bi bi-send-fill" style="font-size:13px"></i>
        </button>
        <button class="stop-btn" id="stopBtn" title="Stop generating">■</button>
      </div>
      <div class="input-hint" id="inputHint">⌘↵ to send &nbsp;·&nbsp; Shift↵ for newline</div>
      <div class="input-warning" id="inputWarning">Your AI agent is not almighty. Do not trust the output blindly!</div>
    </div>
  </div>

</div>

<div id="memoryModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
    <div style="background:var(--bg-primary, white); color:var(--text-primary, black); margin:50px auto; padding:20px; width:90%; max-width:1000px; max-height:95vh; overflow-y:auto; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); position:relative; border:1px solid var(--border-color, #ccc);">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:15px; margin-bottom:15px;">
            <hh3 style="margin:0; font-size:18px;">🧠 Simple Database Explorer</hh3>
            <button onclick="closeModal()" style="background:none; border:none; font-size:28px; cursor:pointer; color:var(--text-muted);">&times;</button>
        </div>

        <!-- 🔍 NEW SEARCH BAR -->
        <div style="margin-bottom: 20px;">
            <input type="text" id="memory-search" oninput="handleSearch()" placeholder="Search title, content or tags..." 
                   style="width:100%; padding:10px; border-radius:var(--radius, 8px); border:1px solid var(--border-color, #ccc); background-color: #ffffff !important; 
                  color: #333333 !important; 
                  font-family: inherit;">
        </div>
        
        <div id="table-wrapper" style="min-height:200px;">
            <!-- Data injected here -->
        </div>
        
       <div id="pagination-controls" style="display:none; justify-content:center; align-items:center; gap:15px; margin-top:20px; padding-top:15px;">
            <button id="prev-page" onclick="changePage(-1)" style="padding:6px 12px; cursor:pointer; border-radius:4px; border:1px solid #ccc;">&laquo; Prev</button>
            <span id="page-info" style="font-family:monospace; font-weight:bold;"></span>
            <button id="next-page" onclick="changePage(1)" style="padding:6px 12px; cursor:pointer; border-radius:4px; border:1px solid #ccc;">Next &raquo;</button>
        </div>
    </div>
</div>




<div class="preview-modal">
  <div class="preview-content">
  <div class="modal-header">
    <span class="type-badge"></span>
    <button class="close-btn" onclick="closePreview()">&times;</button>
  </div>    
  <h2 class="mtitle"></h2>    
  <hr class="modal-divider">
  <div class="mcontent"></div>    
  <hr class="modal-divider">
  <div class="modal-footer">
    <p class="mtags"></p>
    <div class="importance-rating">High Priority</div>
  </div>  
  </div>
</div>
<script src="index.js"></script>
<script src="scripts/input-bar.js"></script>
<script src="scripts/theme-and-timestamp.js"></script>
<script src="scripts/message-handler.js"></script>
</body>
</html>
